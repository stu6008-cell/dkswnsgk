<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>전설의 용사 RPG</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8fd7ff">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; touch-action:manipulation; }
  body { font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; color:#4a2f14;
         background:linear-gradient(#8fd7ff,#cdeeff 60%,#bfe9ff);
         display:flex; flex-direction:column; align-items:center; user-select:none; }

  /* ===== 메이플식 상태바 ===== */
  #topbar { width:calc(100% - 12px); max-width:520px; display:flex; align-items:center; gap:10px;
            margin:6px 0 4px; padding:6px 12px; background:#f7e7c3; border:3px solid #8a5a2b;
            border-radius:14px; box-shadow:0 3px 0 rgba(90,50,10,.25); }
  #lvBadge { flex-shrink:0; background:#ffb545; border:2.5px solid #8a5a2b; border-radius:12px;
             padding:6px 10px; font-weight:900; font-size:15px; color:#5a3300;
             box-shadow:inset 0 -3px 0 rgba(90,50,10,.2); }
  #bars { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
  .barrow { display:flex; align-items:center; gap:6px; font-size:10px; font-weight:900; color:#7a5222; }
  .barrow em { width:26px; font-style:normal; text-align:right; }
  .bar { position:relative; flex:1; height:13px; background:#e3d3ac; border:2px solid #8a5a2b;
         border-radius:8px; overflow:hidden; }
  .bar>div { height:100%; transition:width .2s; border-radius:5px; }
  .bar.hp>div  { background:linear-gradient(#ff8a80,#ff4d4d); }
  .bar.mp>div  { background:linear-gradient(#7cc5ff,#2f8fe8); }
  .bar.exp     { height:10px; }
  .bar.exp>div { background:linear-gradient(#ffe37a,#ffc21a); }
  .bar span { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
              font-size:9px; font-weight:900; color:#4a2f14; text-shadow:0 0 3px #fff,0 0 3px #fff; }
  #items { flex-shrink:0; display:flex; flex-direction:column; gap:2px; font-size:12px; font-weight:700; }

  #gamewrap { position:relative; width:100%; max-width:520px; }
  #cv { width:100%; image-rendering:pixelated; display:block;
        border:3px solid #8a5a2b; border-radius:12px; background:#8fd7ff; }

  #msg { width:calc(100% - 12px); max-width:520px; min-height:38px; margin-top:4px; padding:7px 12px;
         font-size:13px; font-weight:700; background:#fff6dd; border:3px solid #8a5a2b;
         border-radius:12px; color:#5a3a15; }

  /* ===== 조작 & 스킬바 ===== */
  #controls { width:100%; max-width:520px; padding:6px 4px 12px; display:flex;
              flex-direction:column; gap:6px; align-items:center; }
  .btnrow { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; max-width:100%; }
  #controls button { position:relative; border:2.5px solid #8a5a2b; border-radius:12px;
                     background:#f7e7c3; color:#5a3300; font-weight:900; overflow:hidden;
                     box-shadow:0 3px 0 rgba(90,50,10,.3); flex-shrink:0; }
  #controls button:active { background:#ffb545; transform:translateY(2px); box-shadow:none; }
  .mv { width:58px; height:56px; font-size:22px; }
  .sk { width:50px; height:56px; font-size:10px; background:#ffe9bd !important; }
  .sk .ic { display:block; font-size:19px; line-height:1.15; pointer-events:none; }
  .sk .ky { position:absolute; top:1px; left:4px; font-size:9px; color:#a0713d; }
  .sk .cdov { position:absolute; left:0; bottom:0; width:100%; height:0;
              background:rgba(40,20,5,.55); pointer-events:none; }
  .sk .cds { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
             font-size:15px; font-weight:900; color:#fff; text-shadow:0 0 4px #000;
             pointer-events:none; visibility:hidden; }

  /* ===== 오버레이 ===== */
  .overlay { position:fixed; inset:0; background:rgba(40,80,140,.55); backdrop-filter:blur(2px);
             display:flex; flex-direction:column; align-items:center; justify-content:center;
             gap:12px; padding:14px; text-align:center; z-index:10; }
  .hidden { display:none !important; }
  .panel { background:#f7e7c3; border:4px solid #8a5a2b; border-radius:18px; padding:14px;
           box-shadow:0 6px 0 rgba(60,30,5,.3); display:flex; flex-direction:column;
           align-items:center; gap:10px; width:min(94vw,520px); }
  .panel h1 { font-size:25px; color:#e86a00; text-shadow:2px 2px 0 #ffe9b8; }
  .panel p { color:#7a5222; line-height:1.65; font-size:13.5px; font-weight:600; }
  .panel button { padding:13px 26px; border:3px solid #8a5a2b; border-radius:14px; font-size:16px;
                  font-weight:900; background:#ffb545; color:#5a3300;
                  box-shadow:0 3px 0 rgba(90,50,10,.3); }
  .panel button:active { transform:translateY(2px); box-shadow:none; }
  .panel canvas { border:3px solid #8a5a2b; border-radius:12px; max-width:100%;
                  image-rendering:pixelated; }
  .keys { font-size:12px; background:#fff6dd; border:2px solid #d8b062; border-radius:10px;
          padding:8px 10px; line-height:1.8; color:#7a5222; font-weight:700; }
  .keys b { color:#c46a00; }
  #jobs { display:flex; gap:10px; }
  #shopRows { display:flex; flex-direction:column; gap:7px; }
  .shoprow { display:flex; justify-content:space-between; align-items:center; gap:14px;
             width:min(80vw,300px); background:#fff6dd; border:2px solid #d8b062;
             border-radius:10px; padding:6px 10px; font-weight:800; font-size:14px; }
  .shoprow button { padding:7px 12px !important; font-size:13px !important; }
  .jobbtn { display:flex; flex-direction:column; align-items:center; gap:2px;
            padding:8px 10px 6px !important; font-size:14px !important; background:#fff6dd !important; }
  .jobbtn canvas { image-rendering:pixelated; border:none !important; }
  .jobbtn small { font-size:10px; font-weight:700; color:#a0713d; }
  .jobbtn:active { background:#ffe9bd !important; }

  /* ===== 데미지 숫자 ===== */
  .dmg { position:absolute; transform:translateX(-50%); font-weight:900; font-size:21px; z-index:5;
         color:#ffd23e; pointer-events:none; font-family:Verdana,'Malgun Gothic',sans-serif;
         text-shadow:-2px -2px 0 #5a3300, 2px -2px 0 #5a3300, -2px 2px 0 #5a3300, 2px 2px 0 #5a3300;
         animation:dmgpop .85s ease-out forwards; }
  .dmg.hurt { color:#ff6b6b; }
  .dmg.crit { color:#ffa020; font-size:29px; }
  .dmg.heal { color:#7fe860; }
  .dmg.buff { color:#7cc5ff; font-size:16px; }
  .dmg.curse { color:#c07ce8; font-size:16px; }
  @keyframes dmgpop {
    0%   { opacity:1; translate:0 0;    scale:.5; }
    18%  { opacity:1;                   scale:1.15; }
    30%  { scale:1; }
    100% { opacity:0; translate:0 -58px; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="lvBadge">Lv.1</div>
  <div id="bars">
    <div class="barrow"><em>HP</em><div class="bar hp"><div id="uiHp"></div><span id="hpTxt"></span></div></div>
    <div class="barrow"><em>MP</em><div class="bar mp"><div id="uiMp"></div><span id="mpTxt"></span></div></div>
    <div class="barrow"><em>EXP</em><div class="bar exp"><div id="uiExp"></div></div></div>
  </div>
  <div id="items">
    <span>⚔️ <b id="uiAtk">12</b></span>
    <span>🧪 <b id="uiPot">3</b></span>
    <span>💰 <b id="uiGold">0</b></span>
  </div>
</div>

<div id="gamewrap"><canvas id="cv" width="480" height="360"></canvas></div>
<div id="msg">Z키(⚔️버튼)로 공격! 스킬을 눌러보자!</div>

<div id="controls">
  <div class="btnrow" id="mvrow">
    <button class="mv" id="left">◀</button>
    <button class="mv" id="right">▶</button>
    <button class="mv" id="up" style="font-size:13px">▲<br>점프</button>
    <button class="mv" id="down" style="font-size:13px">▼<br>타기</button>
    <button class="mv" id="btnBag">🎒</button>
    <button class="mv" id="btnSnd">🔊</button>
  </div>
  <div class="btnrow" id="skillbar"></div>
</div>

<!-- 타이틀 -->
<div id="title" class="overlay">
  <div class="panel">
    <h1>⚔️ 전설의 용사 RPG</h1>
    <canvas id="tcv" width="360" height="170"></canvas>
    <div class="keys">
      <b>Z</b>공격 <b>X</b>파이어볼 <b>C</b>회오리 <b>D</b>저주 &nbsp;|&nbsp; <b>Shift</b>회피<br>
      <b>A</b>함성(버프) <b>S</b>각성(극딜!) <b>V</b>포탑 <b>B</b>요정 <b>F</b>무적 <b>Q</b>물약<br>
      드래곤의 <b>빨간 경고</b>가 보이면 무조건 피해! 운석은 맞으면 즉사급!
    </div>
    <p style="font-weight:900; color:#c46a00;">▼ 직업을 골라 모험을 시작하자! ▼</p>
    <div id="jobs">
      <button class="jobbtn" id="job_warrior" style="border-color:#c8321f">
        <canvas id="jp_warrior" width="72" height="76"></canvas><b>⚔️ 전사</b><small>튼튼함 HP+</small>
      </button>
      <button class="jobbtn" id="job_mage" style="border-color:#4a5ad8">
        <canvas id="jp_mage" width="72" height="76"></canvas><b>🔮 마법사</b><small>파이어볼 강화</small>
      </button>
      <button class="jobbtn" id="job_archer" style="border-color:#3f8f3f">
        <canvas id="jp_archer" width="72" height="76"></canvas><b>🏹 궁수</b><small>크리티컬+</small>
      </button>
    </div>
    <button id="btnContinue" class="hidden" style="background:#8bd06a;">📂 이어서 하기</button>
  </div>
</div>

<!-- 승리 -->
<div id="victory" class="overlay hidden">
  <div class="panel">
    <h1>🏆 드래곤 토벌 성공!</h1>
    <canvas id="vcv" width="320" height="180"></canvas>
    <p id="vText"></p>
    <button id="btnHard" style="background:#ff7043">🔥 하드 드래곤 도전!</button>
    <button id="btnAgain">🔄 처음부터 다시</button>
  </div>
</div>

<!-- 장비 가방 -->
<div id="bag" class="overlay hidden">
  <div class="panel">
    <h1 style="font-size:20px">🎒 장비</h1>
    <div id="eqSlots"></div>
    <p style="font-size:11.5px; margin:0;">⭐스타포스 강화(실패 가능!) · 🔷큐브 = 잠재능력 뽑기 (150G)</p>
    <div id="invRows" style="max-height:170px; overflow-y:auto; display:flex; flex-direction:column; gap:6px;"></div>
    <button id="btnBagClose" style="background:#d9c9a8">닫기</button>
  </div>
</div>

<!-- NPC 촌장 -->
<div id="npc" class="overlay hidden">
  <div class="panel">
    <h1 style="font-size:20px">👴 촌장님</h1>
    <canvas id="ncv" width="120" height="130"></canvas>
    <p id="npcText"></p>
    <button id="btnQuest">📜 퀘스트</button>
    <button id="btnAdv" class="hidden" style="background:#c58aff">🌟 2차 전직하기!</button>
    <button id="btnShop" style="background:#8bd06a">🛒 상점 열기</button>
    <button id="btnNpcClose" style="background:#d9c9a8">닫기</button>
  </div>
</div>

<!-- 상점 -->
<div id="shop" class="overlay hidden">
  <div class="panel">
    <h1 style="font-size:20px">🛒 촌장님의 상점</h1>
    <p>가진 골드: 💰 <b id="shopGold">0</b></p>
    <div id="shopRows"></div>
    <button id="btnShopClose" style="background:#d9c9a8">닫기</button>
  </div>
</div>

<script>
"use strict";
// ===== 아트 =====

function drawSlime(ctx, x, y, size, frame) {
  ctx.save();
  ctx.translate(x, y);
  var lw = Math.max(2, size * 0.035);
  var sq = (frame === 1);
  var h = size * (sq ? 0.88 : 1.0);
  var w = size * (sq ? 1.23 : 1.12);
  var hw = w / 2;

  function bodyPath() {
    ctx.beginPath();
    ctx.moveTo(-hw * 0.78, 0);
    ctx.quadraticCurveTo(-hw * 1.02, -h * 0.02, -hw * 0.99, -h * 0.30);
    ctx.bezierCurveTo(-hw * 0.97, -h * 0.66, -hw * 0.70, -h * 0.90, -hw * 0.30, -h * 0.955);
    ctx.bezierCurveTo(-hw * 0.34, -h * 1.02, -hw * 0.16, -h * 1.05, -hw * 0.04, -h * 0.975);
    ctx.bezierCurveTo(hw * 0.14, -h * 0.945, hw * 0.88, -h * 0.72, hw * 0.99, -h * 0.30);
    ctx.quadraticCurveTo(hw * 1.02, -h * 0.02, hw * 0.78, 0);
    ctx.quadraticCurveTo(0, -h * 0.035, -hw * 0.78, 0);
    ctx.closePath();
  }

  // main jelly fill
  bodyPath();
  ctx.fillStyle = '#5cd94e';
  ctx.fill();

  // inner shading (clipped to body)
  ctx.save();
  bodyPath();
  ctx.clip();

  // darker green bottom edge
  ctx.fillStyle = '#2fa53c';
  ctx.beginPath();
  ctx.ellipse(0, h * 0.12, hw * 1.08, h * 0.30, 0, 0, Math.PI * 2);
  ctx.fill();

  // lighter tone patch upper-left (subtle)
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#8ef07a';
  ctx.beginPath();
  ctx.ellipse(-hw * 0.28, -h * 0.72, hw * 0.42, h * 0.22, -0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // big glossy white highlight upper-left
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(-hw * 0.40, -h * 0.76, hw * 0.16, h * 0.085, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-hw * 0.58, -h * 0.62, hw * 0.055, h * 0.038, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // tiny jelly sparkle dots on the right side
  var bub = [[0.48, 0.60, 0.024], [0.60, 0.45, 0.016]];
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#d8ffc6';
  for (var i = 0; i < bub.length; i++) {
    ctx.beginPath();
    ctx.arc(hw * bub[i][0], -h * bub[i][1], size * bub[i][2], 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // outline
  ctx.strokeStyle = '#3a2417';
  ctx.lineWidth = lw;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  bodyPath();
  ctx.stroke();

  // face (shifted left = facing LEFT)
  var eyeY = -h * 0.50;
  var erx = size * 0.048;
  var ery = h * 0.115;
  var eyes = [-hw * 0.50, -hw * 0.06];
  for (var j = 0; j < 2; j++) {
    var ex = eyes[j];
    ctx.fillStyle = '#1b130d';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, erx, ery, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ex - erx * 0.30, eyeY - ery * 0.42, erx * 0.44, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(ex + erx * 0.22, eyeY + ery * 0.45, erx * 0.20, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // small open mouth
  ctx.fillStyle = '#66301d';
  ctx.beginPath();
  ctx.ellipse(-hw * 0.28, -h * 0.325, size * 0.048, h * 0.052, 0, 0, Math.PI * 2);
  ctx.fill();
  // tongue
  ctx.fillStyle = '#ff8fa8';
  ctx.beginPath();
  ctx.ellipse(-hw * 0.28, -h * 0.305, size * 0.030, h * 0.026, 0, 0, Math.PI * 2);
  ctx.fill();

  // blush (near-solid: translucent pink turns muddy over green)
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ff8fae';
  ctx.beginPath();
  ctx.ellipse(-hw * 0.66, -h * 0.37, size * 0.062, size * 0.042, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(hw * 0.20, -h * 0.37, size * 0.062, size * 0.042, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawSnail(ctx, x, y, size, frame) {
  ctx.save();
  const s = size;
  const lw = Math.max(2, s * 0.035);
  const OUT = '#3a2417';
  ctx.lineWidth = lw;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.strokeStyle = OUT;

  const f = frame ? 1 : 0;
  const stretch = f ? s * 0.09 : 0;        // head reaches forward (left)
  const squash  = f ? s * 0.04 : 0;        // shell settles down a touch
  const tiltX   = f ? -s * 0.12 : 0;       // eyestalk tips lean forward
  const tiltY   = f ? s * 0.05 : 0;        // ... and dip slightly

  // palette
  const BODY  = '#f8e3b0';
  const BODYD = '#e6c184';
  const SHELL = '#ef8f3c';
  const SHELLD = '#cf6d22';
  const SHELLL = '#ffb769';

  // key coordinates
  const footR = x + 0.58 * s;
  const headCx = x - 0.44 * s - stretch;
  const headTop = y - 0.52 * s + squash * 0.6;

  const shR  = 0.42 * s;
  const shCx = x + 0.13 * s;
  const shCy = y - 0.48 * s + squash;

  // ---------- body path helper ----------
  function bodyPath() {
    ctx.beginPath();
    ctx.moveTo(footR, y);
    ctx.quadraticCurveTo(footR + 0.05 * s, y - 0.14 * s, footR - 0.10 * s, y - 0.19 * s); // tail curl
    ctx.quadraticCurveTo(x + 0.12 * s, y - 0.27 * s, x - 0.16 * s, y - 0.30 * s);        // back of foot
    ctx.quadraticCurveTo(headCx + 0.20 * s, headTop + 0.02 * s, headCx, headTop);        // neck up
    ctx.quadraticCurveTo(headCx - 0.26 * s, headTop, headCx - 0.25 * s, y - 0.18 * s);   // face front
    ctx.quadraticCurveTo(headCx - 0.25 * s, y - 0.01 * s, headCx - 0.02 * s, y);         // chin to ground
    ctx.closePath();
  }

  // ---------- eyestalks (behind nothing, drawn before shell so they sit on head) ----------
  const stalks = [
    { bx: headCx - 0.01 * s, tx: headCx - 0.07 * s + tiltX, ty: y - 0.85 * s + tiltY },
    { bx: headCx + 0.13 * s, tx: headCx + 0.13 * s + tiltX, ty: y - 0.80 * s + tiltY }
  ];
  for (const st of stalks) {
    const by = headTop + 0.06 * s;
    // outlined stalk: fat dark stroke then body-color stroke
    ctx.beginPath();
    ctx.moveTo(st.bx, by);
    ctx.quadraticCurveTo(st.bx + 0.02 * s, (by + st.ty) / 2, st.tx, st.ty);
    ctx.lineWidth = s * 0.075 + lw * 2;
    ctx.strokeStyle = OUT;
    ctx.stroke();
    ctx.lineWidth = s * 0.075;
    ctx.strokeStyle = BODY;
    ctx.stroke();
  }
  ctx.lineWidth = lw;
  ctx.strokeStyle = OUT;

  // ---------- body ----------
  ctx.fillStyle = BODY;
  bodyPath();
  ctx.fill();
  // cel shade: darker band along the bottom of the foot
  ctx.save();
  bodyPath();
  ctx.clip();
  ctx.fillStyle = BODYD;
  ctx.beginPath();
  ctx.ellipse(x + 0.05 * s, y + 0.06 * s, 0.75 * s, 0.16 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  // light highlight on top of head
  ctx.fillStyle = '#fff3d4';
  ctx.beginPath();
  ctx.ellipse(headCx - 0.08 * s, headTop + 0.09 * s, 0.11 * s, 0.055 * s, -0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  bodyPath();
  ctx.stroke();

  // ---------- shell ----------
  ctx.fillStyle = SHELL;
  ctx.beginPath();
  ctx.arc(shCx, shCy, shR, 0, Math.PI * 2);
  ctx.fill();
  ctx.save();
  ctx.beginPath();
  ctx.arc(shCx, shCy, shR, 0, Math.PI * 2);
  ctx.clip();
  // dark lower-right crescent
  ctx.fillStyle = SHELLD;
  ctx.beginPath();
  ctx.arc(shCx + 0.12 * s, shCy + 0.12 * s, shR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = SHELL;
  ctx.beginPath();
  ctx.arc(shCx + 0.02 * s, shCy + 0.02 * s, shR * 0.92, 0, Math.PI * 2);
  ctx.fill();
  // light highlight upper-left
  ctx.fillStyle = SHELLL;
  ctx.beginPath();
  ctx.ellipse(shCx - 0.14 * s, shCy - 0.16 * s, shR * 0.34, shR * 0.22, -0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // spiral
  ctx.beginPath();
  const turns = 2.1, steps = 60, a0 = Math.PI * 0.9;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = a0 + t * turns * Math.PI * 2;
    const r = t * shR * 0.86;
    const px = shCx + Math.cos(a) * r;
    const py = shCy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.lineWidth = Math.max(2, lw * 0.8);
  ctx.stroke();
  // little freckle dots between spiral arms (hardcoded, deterministic)
  ctx.fillStyle = SHELLD;
  const dots = [[0.55, -2.2], [0.62, 0.5], [0.5, 2.4]];
  for (const [dr, da] of dots) {
    ctx.beginPath();
    ctx.arc(shCx + Math.cos(da) * dr * shR, shCy + Math.sin(da) * dr * shR, 0.028 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.arc(shCx, shCy, shR, 0, Math.PI * 2);
  ctx.stroke();

  // ---------- eyes on stalk tips ----------
  for (const st of stalks) {
    const er = 0.115 * s;
    const ecy = st.ty - er * 0.35;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(st.tx, ecy, er, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // big glossy pupil (vertical oval)
    ctx.fillStyle = '#1b1210';
    ctx.beginPath();
    ctx.ellipse(st.tx - er * 0.18, ecy + er * 0.05, er * 0.56, er * 0.74, 0, 0, Math.PI * 2);
    ctx.fill();
    // shine dots
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(st.tx - er * 0.38, ecy - er * 0.3, er * 0.22, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(st.tx - er * 0.05, ecy + er * 0.28, er * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---------- face: mouth + blush ----------
  ctx.strokeStyle = OUT;
  ctx.lineWidth = Math.max(2, lw * 0.8);
  ctx.beginPath();
  ctx.arc(headCx - 0.16 * s, y - 0.31 * s, 0.07 * s, Math.PI * 0.12, Math.PI * 0.88);
  ctx.stroke();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#ff6f96';
  ctx.beginPath();
  ctx.ellipse(headCx - 0.005 * s, y - 0.315 * s, 0.085 * s, 0.06 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawMushroom(ctx, x, y, size, frame) {
  ctx.save();
  const u = size / 100, lw = Math.max(2, size * 0.035);
  ctx.lineWidth = lw; ctx.strokeStyle = "#3a2417"; ctx.lineJoin = "round"; ctx.lineCap = "round";
  const E = (cx, cy, rx, ry, fill, noStroke) => { ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fillStyle = fill; ctx.fill(); if (!noStroke) ctx.stroke(); };
  const dy = frame ? 4 * u : 0, rx = frame ? 50 * u : 48 * u;
  // 발
  E(x - 13 * u, y - 3 * u, 8 * u, 4.5 * u, "#f7e3c0");
  E(x + 11 * u, y - 3 * u, 8 * u, 4.5 * u, "#f7e3c0");
  // 몸통(자루)
  E(x, y - 26 * u, 26 * u, 24 * u, "#f7e3c0");
  // 얼굴 (심술 귀여움, 왼쪽 보기)
  ctx.fillStyle = "#1a1208";
  ctx.beginPath(); ctx.ellipse(x - 13 * u, y - 28 * u, 3.6 * u, 5.6 * u, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 3 * u, y - 28 * u, 3.6 * u, 5.6 * u, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(x - 14.5 * u, y - 30 * u, 1.4 * u, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 1.5 * u, y - 30 * u, 1.4 * u, 0, Math.PI * 2); ctx.fill();
  // 화난 눈썹 (안쪽이 아래로)
  ctx.beginPath(); ctx.moveTo(x - 20 * u, y - 39 * u); ctx.lineTo(x - 9 * u, y - 36 * u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - 1 * u, y - 36 * u); ctx.lineTo(x + 10 * u, y - 39 * u); ctx.stroke();
  // 뿌루퉁 입
  ctx.beginPath(); ctx.arc(x - 5 * u, y - 15 * u, 4 * u, 1.15 * Math.PI, 1.85 * Math.PI); ctx.stroke();
  // 볼터치
  ctx.save(); ctx.globalAlpha = 0.35;
  E(x - 21 * u, y - 20 * u, 4.5 * u, 3 * u, "#ff8fa3", true);
  E(x + 11 * u, y - 20 * u, 4.5 * u, 3 * u, "#ff8fa3", true);
  ctx.restore();
  // 갓 (주황 헬멧)
  ctx.beginPath(); ctx.ellipse(x, y - 62 * u + dy, rx, 25 * u, 0, 0, Math.PI * 2);
  ctx.fillStyle = "#ff8c1a"; ctx.fill(); ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(x, y - 62 * u + dy, rx, 25 * u, 0, 0, Math.PI * 2); ctx.clip();
  E(x - 28 * u, y - 66 * u + dy, 9 * u, 7 * u, "#ffe9c4", true);
  E(x + 10 * u, y - 74 * u + dy, 11 * u, 8 * u, "#ffe9c4", true);
  E(x + 36 * u, y - 56 * u + dy, 7 * u, 6 * u, "#ffe9c4", true);
  ctx.globalAlpha = 0.4; E(x, y - 45 * u + dy, rx * 0.9, 7 * u, "#d86f00", true);
  ctx.restore();
  ctx.restore();
}

function drawPig(ctx, x, y, size, frame) {
  ctx.save();
  const u = size / 100, lw = Math.max(2, size * 0.035);
  ctx.lineWidth = lw; ctx.strokeStyle = "#3a2417"; ctx.lineJoin = "round"; ctx.lineCap = "round";
  const E = (cx, cy, rx, ry, fill, noStroke) => { ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fillStyle = fill; ctx.fill(); if (!noStroke) ctx.stroke(); };
  const hop = frame ? -5 * u : 0, legH = frame ? 6 * u : 11 * u;
  // 다리
  E(x - 20 * u, y - legH / 2, 6 * u, legH / 2 + 2 * u, "#f08aa0");
  E(x + 16 * u, y - legH / 2, 6 * u, legH / 2 + 2 * u, "#f08aa0");
  // 꼬리 (오른쪽 돼지꼬리)
  ctx.strokeStyle = "#f08aa0"; ctx.lineWidth = lw * 0.9;
  ctx.beginPath(); ctx.arc(x + 42 * u, y - 46 * u + hop, 6 * u, -0.5 * Math.PI, 0.9 * Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + 46 * u, y - 42 * u + hop, 3.5 * u, 0.6 * Math.PI, 1.9 * Math.PI); ctx.stroke();
  ctx.strokeStyle = "#3a2417"; ctx.lineWidth = lw;
  // 귀
  const ear = (ex, ey, flip) => {
    ctx.beginPath(); ctx.moveTo(ex, ey);
    ctx.lineTo(ex + 12 * u * flip, ey - 14 * u);
    ctx.lineTo(ex + 17 * u * flip, ey + 3 * u);
    ctx.closePath(); ctx.fillStyle = "#ffb3c4"; ctx.fill(); ctx.stroke();
  };
  ear(x - 30 * u, y - 76 * u + hop, 1);
  ear(x + 28 * u, y - 76 * u + hop, -1);
  // 몸통(=머리, 통짜)
  E(x, y - 42 * u + hop, 40 * u, 40 * u, "#ffb3c4");
  ctx.save(); ctx.globalAlpha = 0.3; E(x + 12 * u, y - 22 * u + hop, 22 * u, 10 * u, "#f08aa0", true); ctx.restore();
  // 리본 (머리 오른쪽)
  const bx = x + 16 * u, by = y - 80 * u + hop;
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - 11 * u, by - 7 * u); ctx.lineTo(bx - 11 * u, by + 7 * u); ctx.closePath();
  ctx.fillStyle = "#ff5b6e"; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + 11 * u, by - 7 * u); ctx.lineTo(bx + 11 * u, by + 7 * u); ctx.closePath();
  ctx.fillStyle = "#ff5b6e"; ctx.fill(); ctx.stroke();
  E(bx, by, 4 * u, 4 * u, "#ffd23e");
  // 코 (왼쪽 얼굴)
  E(x - 34 * u, y - 42 * u + hop, 14 * u, 11 * u, "#f08aa0");
  ctx.fillStyle = "#a34455";
  ctx.beginPath(); ctx.ellipse(x - 39 * u, y - 42 * u + hop, 2.2 * u, 4 * u, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x - 30 * u, y - 42 * u + hop, 2.2 * u, 4 * u, 0, 0, Math.PI * 2); ctx.fill();
  // 눈
  ctx.fillStyle = "#1a1208";
  ctx.beginPath(); ctx.ellipse(x - 15 * u, y - 54 * u + hop, 4 * u, 6 * u, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 5 * u, y - 52 * u + hop, 4 * u, 6 * u, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(x - 16.5 * u, y - 56 * u + hop, 1.5 * u, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3.5 * u, y - 54 * u + hop, 1.5 * u, 0, Math.PI * 2); ctx.fill();
  // 볼터치
  ctx.save(); ctx.globalAlpha = 0.35;
  E(x - 18 * u, y - 40 * u + hop, 5 * u, 3.5 * u, "#ff6f8f", true);
  E(x + 12 * u, y - 40 * u + hop, 5 * u, 3.5 * u, "#ff6f8f", true);
  ctx.restore();
  ctx.restore();
}

function drawBear(ctx, x, y, size, frame) {
  ctx.save();
  const u = size / 100, lw = Math.max(2, size * 0.035);
  ctx.lineWidth = lw; ctx.strokeStyle = "#3a2417"; ctx.lineJoin = "round"; ctx.lineCap = "round";
  const E = (cx, cy, rx, ry, fill, noStroke, rot) => { ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, rot || 0, 0, Math.PI * 2); ctx.fillStyle = fill; ctx.fill(); if (!noStroke) ctx.stroke(); };
  const NAVY = "#3b4a6b", LT = "#93a7cc";
  const hd = frame ? -2 * u : 0;
  // 팔 (frame1이면 위로 번쩍)
  const armRot = frame ? -0.9 : 0.5, armY = frame ? -46 * u : -32 * u;
  E(x - 32 * u, y + armY, 8 * u, 15 * u, NAVY, false, armRot);
  E(x + 32 * u, y + armY, 8 * u, 15 * u, NAVY, false, -armRot);
  // 다리
  E(x - 15 * u, y - 6 * u, 10 * u, 7 * u, NAVY);
  E(x + 15 * u, y - 6 * u, 10 * u, 7 * u, NAVY);
  // 몸통
  E(x, y - 28 * u, 30 * u, 26 * u, NAVY);
  // 배 패치 + 바느질
  E(x - 2 * u, y - 24 * u, 17 * u, 13 * u, LT);
  ctx.lineWidth = lw * 0.6;
  for (const a of [0.3, 1.2, 2.1, 3.0, 3.9, 5.0]) {
    const sx = x - 2 * u + Math.cos(a) * 17 * u, sy = y - 24 * u + Math.sin(a) * 13 * u;
    ctx.beginPath(); ctx.moveTo(sx - 2.5 * u, sy - 2.5 * u); ctx.lineTo(sx + 2.5 * u, sy + 2.5 * u); ctx.stroke();
  }
  ctx.lineWidth = lw;
  // 귀
  E(x - 20 * u + hd, y - 90 * u, 10 * u, 10 * u, NAVY);
  E(x + 20 * u + hd, y - 90 * u, 10 * u, 10 * u, NAVY);
  E(x - 20 * u + hd, y - 90 * u, 5 * u, 5 * u, LT, true);
  E(x + 20 * u + hd, y - 90 * u, 5 * u, 5 * u, LT, true);
  // 머리
  E(x + hd, y - 64 * u, 29 * u, 27 * u, NAVY);
  E(x, y - 46 * u, 16 * u, 8 * u, NAVY, true); // 이음새 가리기
  // 빛나는 노란 눈
  for (const ex of [x - 12 * u + hd, x + 9 * u + hd]) {
    ctx.save(); ctx.globalAlpha = 0.3; E(ex, y - 66 * u, 8 * u, 8 * u, "#ffd23e", true); ctx.restore();
    E(ex, y - 66 * u, 5 * u, 5.5 * u, "#ffd23e");
    ctx.fillStyle = "#1a1208"; ctx.beginPath(); ctx.arc(ex - 1 * u, y - 65 * u, 2.4 * u, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ex - 2 * u, y - 68 * u, 1.1 * u, 0, Math.PI * 2); ctx.fill();
  }
  // 뚱한 눈썹
  ctx.beginPath(); ctx.moveTo(x - 19 * u + hd, y - 77 * u); ctx.lineTo(x - 6 * u + hd, y - 73 * u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 3 * u + hd, y - 73 * u); ctx.lineTo(x + 16 * u + hd, y - 77 * u); ctx.stroke();
  // 바느질 입 (일자 + 매듭)
  ctx.beginPath(); ctx.moveTo(x - 8 * u + hd, y - 52 * u); ctx.lineTo(x + 6 * u + hd, y - 52 * u); ctx.stroke();
  ctx.lineWidth = lw * 0.6;
  for (const mx of [-5, 0, 5]) {
    ctx.beginPath(); ctx.moveTo(x + mx * u + hd, y - 55 * u); ctx.lineTo(x + (mx + 2) * u + hd, y - 49 * u); ctx.stroke();
  }
  ctx.restore();
}

function drawDragon(ctx, x, y, size, frame) {
  ctx.save();
  const u = size / 100, lw = Math.max(2.5, size * 0.03);
  ctx.lineWidth = lw; ctx.strokeStyle = "#3a2417"; ctx.lineJoin = "round"; ctx.lineCap = "round";
  const E = (cx, cy, rx, ry, fill, noStroke, rot) => { ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, rot || 0, 0, Math.PI * 2); ctx.fillStyle = fill; ctx.fill(); if (!noStroke) ctx.stroke(); };
  const RED = "#e8452e", DRED = "#b8321f", CREAM = "#ffdfae";
  const rise = frame ? -3 * u : 0, wingUp = frame ? -14 * u : 0;
  // 날개 2장 (뒤)
  const wing = (wx, wy, col, sc) => {
    ctx.beginPath();
    ctx.moveTo(wx, wy);
    ctx.quadraticCurveTo(wx + 20 * u * sc, wy - 48 * u + wingUp, wx + 40 * u * sc, wy - 42 * u + wingUp);
    ctx.quadraticCurveTo(wx + 30 * u * sc, wy - 24 * u + wingUp * 0.5, wx + 34 * u * sc, wy - 12 * u);
    ctx.quadraticCurveTo(wx + 20 * u * sc, wy - 10 * u, wx, wy);
    ctx.closePath(); ctx.fillStyle = col; ctx.fill(); ctx.stroke();
  };
  wing(x + 16 * u, y - 58 * u + rise, DRED, 1.15);
  wing(x + 4 * u, y - 62 * u + rise, "#d84030", 0.95);
  // 꼬리 (테두리 있는 튜브)
  ctx.beginPath(); ctx.moveTo(x + 22 * u, y - 18 * u);
  ctx.quadraticCurveTo(x + 52 * u, y - 22 * u, x + 50 * u, y - 52 * u);
  ctx.lineWidth = 11 * u; ctx.strokeStyle = "#3a2417"; ctx.stroke();
  ctx.lineWidth = 7 * u; ctx.strokeStyle = RED; ctx.stroke();
  ctx.lineWidth = lw; ctx.strokeStyle = "#3a2417";
  // 꼬리 끝 스페이드
  ctx.beginPath(); ctx.moveTo(x + 50 * u, y - 66 * u);
  ctx.lineTo(x + 42 * u, y - 50 * u); ctx.lineTo(x + 58 * u, y - 50 * u); ctx.closePath();
  ctx.fillStyle = DRED; ctx.fill(); ctx.stroke();
  // 등 가시
  for (const [a, r] of [[-0.25, 1], [0.15, 1], [0.55, 0.9]]) {
    const bx = x + Math.cos(a) * 36 * u, by = y - 40 * u + rise + Math.sin(a) * 36 * u;
    ctx.beginPath(); ctx.moveTo(bx - 5 * u, by + 3 * u);
    ctx.lineTo(bx + 8 * u * r, by - 8 * u * r); ctx.lineTo(bx + 6 * u, by + 7 * u);
    ctx.closePath(); ctx.fillStyle = CREAM; ctx.fill(); ctx.stroke();
  }
  // 다리
  E(x - 16 * u, y - 8 * u, 11 * u, 11 * u, RED);
  E(x + 10 * u, y - 8 * u, 11 * u, 11 * u, RED);
  ctx.fillStyle = "#fff";
  for (const bx of [x - 24 * u, x - 17 * u, x - 10 * u, x + 2 * u, x + 9 * u, x + 16 * u]) {
    ctx.beginPath(); ctx.moveTo(bx, y - 4 * u); ctx.lineTo(bx + 2.5 * u, y); ctx.lineTo(bx + 5 * u, y - 4 * u); ctx.closePath(); ctx.fill();
  }
  // 몸통 + 배
  E(x, y - 40 * u + rise, 37 * u, 37 * u, RED);
  ctx.save();
  ctx.beginPath(); ctx.ellipse(x, y - 40 * u + rise, 37 * u, 37 * u, 0, 0, Math.PI * 2); ctx.clip();
  E(x - 12 * u, y - 28 * u + rise, 22 * u, 27 * u, CREAM, true);
  ctx.strokeStyle = "#d8a86a"; ctx.lineWidth = lw * 0.7;
  for (const by of [-42, -32, -22, -12]) {
    ctx.beginPath(); ctx.moveTo(x - 33 * u, y + by * u + rise); ctx.quadraticCurveTo(x - 12 * u, y + (by + 4) * u + rise, x + 9 * u, y + by * u + rise); ctx.stroke();
  }
  ctx.restore();
  ctx.strokeStyle = "#3a2417"; ctx.lineWidth = lw;
  // 머리
  E(x - 14 * u, y - 80 * u + rise, 25 * u, 23 * u, RED);
  E(x - 8 * u, y - 62 * u + rise, 14 * u, 8 * u, RED, true); // 이음새
  // 주둥이
  E(x - 40 * u, y - 76 * u + rise, 13 * u, 9 * u, "#f06048");
  ctx.fillStyle = "#5a1408";
  ctx.beginPath(); ctx.ellipse(x - 46 * u, y - 78 * u + rise, 1.8 * u, 2.6 * u, 0, 0, Math.PI * 2); ctx.fill();
  // 콧김 연기
  ctx.save(); ctx.globalAlpha = 0.45;
  E(x - 58 * u, y - 84 * u + rise - (frame ? 3 * u : 0), 5 * u, 4 * u, "#cfd6dd", true);
  E(x - 65 * u, y - 92 * u + rise - (frame ? 4 * u : 0), 3.5 * u, 3 * u, "#cfd6dd", true);
  ctx.restore();
  // 씨익 웃는 입 + 이빨
  ctx.beginPath(); ctx.moveTo(x - 50 * u, y - 70 * u + rise);
  ctx.quadraticCurveTo(x - 34 * u, y - 60 * u + rise, x - 16 * u, y - 64 * u + rise);
  ctx.stroke();
  ctx.fillStyle = "#fff";
  for (const [tx, ty] of [[-44, -68], [-36, -65], [-28, -64]]) {
    ctx.beginPath(); ctx.moveTo(x + tx * u, y + ty * u + rise);
    ctx.lineTo(x + (tx + 3) * u, y + (ty + 5) * u + rise);
    ctx.lineTo(x + (tx + 6) * u, y + ty * u + rise); ctx.closePath(); ctx.fill();
  }
  // 뿔
  const horn = (hx, hy, sc) => {
    ctx.beginPath(); ctx.moveTo(hx, hy);
    ctx.quadraticCurveTo(hx + 2 * u * sc, hy - 14 * u, hx + 9 * u * sc, hy - 18 * u);
    ctx.quadraticCurveTo(hx + 8 * u * sc, hy - 6 * u, hx + 12 * u * sc, hy + 2 * u);
    ctx.closePath(); ctx.fillStyle = CREAM; ctx.fill(); ctx.stroke();
  };
  horn(x - 30 * u, y - 98 * u + rise, -1);
  horn(x - 6 * u, y - 100 * u + rise, 1);
  // 화난 눈
  E(x - 26 * u, y - 84 * u + rise, 6 * u, 7.5 * u, "#fff");
  ctx.fillStyle = "#1a1208"; ctx.beginPath(); ctx.ellipse(x - 28 * u, y - 83 * u + rise, 3 * u, 4 * u, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 29.5 * u, y - 86 * u + rise, 1.3 * u, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#8c1f10"; ctx.lineWidth = lw * 1.3;
  ctx.beginPath(); ctx.moveTo(x - 35 * u, y - 95 * u + rise); ctx.lineTo(x - 19 * u, y - 91 * u + rise); ctx.stroke();
  ctx.restore();
}

// ===== 전투 배경 =====
function drawBattleBg(ctx, w, h) {
  ctx.save();
  const fl = h * 0.78;
  // 하늘
  const sky = ctx.createLinearGradient(0, 0, 0, fl);
  sky.addColorStop(0, "#8fd7ff"); sky.addColorStop(1, "#ddf4ff");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, w, fl + 2);
  // 해
  ctx.save(); ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#fff3b0";
  ctx.beginPath(); ctx.arc(w * 0.88, h * 0.14, h * 0.075, 0, 7); ctx.fill();
  ctx.globalAlpha = 0.25;
  ctx.beginPath(); ctx.arc(w * 0.88, h * 0.14, h * 0.115, 0, 7); ctx.fill();
  ctx.restore();
  // 구름
  const cloud = (cx, cy, sc) => {
    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath();
    ctx.arc(cx - 22 * sc, cy, 14 * sc, 0, 7);
    ctx.arc(cx, cy - 9 * sc, 18 * sc, 0, 7);
    ctx.arc(cx + 22 * sc, cy, 13 * sc, 0, 7);
    ctx.arc(cx, cy + 4 * sc, 16 * sc, 0, 7);
    ctx.fill();
  };
  cloud(w * 0.18, h * 0.16, h / 300);
  cloud(w * 0.62, h * 0.09, h / 300 * 0.8);
  // 뒷동산 2겹
  ctx.fillStyle = "#a5d97a";
  ctx.beginPath(); ctx.ellipse(w * 0.22, fl + h * 0.06, w * 0.42, h * 0.22, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = "#93cf68";
  ctx.beginPath(); ctx.ellipse(w * 0.85, fl + h * 0.08, w * 0.38, h * 0.17, 0, Math.PI, 0); ctx.fill();
  // 멀리 나무
  ctx.fillStyle = "#7ba95a";
  ctx.fillRect(w * 0.205, fl - h * 0.155, w * 0.012, h * 0.05);
  ctx.beginPath(); ctx.arc(w * 0.21, fl - h * 0.18, h * 0.05, 0, 7); ctx.fill();
  // 땅
  ctx.fillStyle = "#7ec850"; ctx.fillRect(0, fl, w, h - fl);
  ctx.fillStyle = "#8ed155"; ctx.fillRect(0, fl, w, h * 0.035);
  ctx.strokeStyle = "#5fae35"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, fl); ctx.lineTo(w, fl); ctx.stroke();
  // 가장자리 꽃/풀 (가운데는 비워둠)
  const deco = [[0.05, 0.86, 1], [0.12, 0.93, 0], [0.9, 0.9, 1], [0.96, 0.84, 0], [0.84, 0.96, 0]];
  for (const [fx, fy, isFlower] of deco) {
    const dx = w * fx, dy = h * fy;
    if (isFlower) {
      ctx.fillStyle = "#fff";
      for (const [ax, ay] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
        ctx.beginPath(); ctx.arc(dx + ax * 4, dy + ay * 4, 3.2, 0, 7); ctx.fill();
      }
      ctx.fillStyle = "#ffd23e"; ctx.beginPath(); ctx.arc(dx, dy, 3, 0, 7); ctx.fill();
    } else {
      ctx.strokeStyle = "#5fae35"; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(dx, dy); ctx.lineTo(dx - 3, dy - 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(dx, dy); ctx.lineTo(dx + 3, dy - 7); ctx.stroke();
    }
  }
  ctx.restore();
}


function drawGroundTile(ctx, x, y, s){
  ctx.save();
  const lw = Math.max(2, s*0.035);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  // dirt base
  ctx.fillStyle = '#a0713d';
  ctx.fillRect(x, y, s, s);
  ctx.fillStyle = '#8a5a2b';
  ctx.fillRect(x, y + s*0.74, s, s*0.26);
  // dark speckles (position-hashed, kept off left/right edges)
  ctx.fillStyle = '#7a4e23';
  for (let i = 0; i < 5; i++){
    const hx = (Math.abs(x*7 + y*13 + i*29) % 97) / 97;
    const hy = (Math.abs(x*11 + y*5 + i*53) % 89) / 89;
    ctx.beginPath();
    ctx.arc(x + s*(0.12 + hx*0.76), y + s*(0.38 + hy*0.5), s*0.032, 0, Math.PI*2);
    ctx.fill();
  }
  // 1-2 rounded rocks
  const nR = 1 + (Math.abs(x*13 + y*7) % 2);
  for (let i = 0; i < nR; i++){
    const hx = (Math.abs(x*17 + y*3 + i*41) % 71) / 71;
    const hy = (Math.abs(x*5 + y*11 + i*37) % 61) / 61;
    const rx = x + s*(0.22 + hx*0.56), ry = y + s*(0.52 + hy*0.32), rr = s*0.075;
    ctx.fillStyle = '#9aa3ad';
    ctx.beginPath();
    ctx.ellipse(rx, ry, rr*1.25, rr, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#3a2417';
    ctx.lineWidth = Math.max(1.5, lw*0.7);
    ctx.stroke();
    ctx.fillStyle = '#c2c9d1';
    ctx.beginPath();
    ctx.arc(rx - rr*0.4, ry - rr*0.3, rr*0.4, 0, Math.PI*2);
    ctx.fill();
  }
  // grass lip with wavy/notched bottom edge (fixed 4 scallops -> tiles seamlessly)
  const gh = s*0.2, amp = s*0.085, n = 4, w = s/n;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + s, y);
  ctx.lineTo(x + s, y + gh);
  for (let i = 0; i < n; i++){
    ctx.quadraticCurveTo(x + s - (i + 0.5)*w, y + gh + amp, x + s - (i + 1)*w, y + gh);
  }
  ctx.closePath();
  ctx.fillStyle = '#7ec850';
  ctx.fill();
  // grass highlight stripe
  ctx.fillStyle = '#8ed155';
  ctx.fillRect(x, y + s*0.055, s, s*0.07);
  // thin darker green line at top edge
  ctx.fillStyle = '#5fae35';
  ctx.fillRect(x, y, s, s*0.045);
  // dark outline along wavy grass bottom
  ctx.beginPath();
  ctx.moveTo(x + s, y + gh);
  for (let i = 0; i < n; i++){
    ctx.quadraticCurveTo(x + s - (i + 0.5)*w, y + gh + amp, x + s - (i + 1)*w, y + gh);
  }
  ctx.strokeStyle = '#3a2417';
  ctx.lineWidth = lw;
  ctx.stroke();
  ctx.restore();
}

function drawTreeBig(ctx, x, y, size){
  ctx.save();
  const lw = Math.max(2, size*0.035);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = '#3a2417';
  ctx.lineWidth = lw;
  // trunk, wider at base
  const tw = size*0.09, th = size*0.46;
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath();
  ctx.moveTo(x - tw*1.7, y);
  ctx.quadraticCurveTo(x - tw, y - th*0.35, x - tw, y - th);
  ctx.lineTo(x + tw, y - th);
  ctx.quadraticCurveTo(x + tw, y - th*0.35, x + tw*1.7, y);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // trunk shade on right side
  ctx.fillStyle = '#6f4520';
  ctx.beginPath();
  ctx.moveTo(x + tw*0.25, y - lw);
  ctx.quadraticCurveTo(x + tw*0.25, y - th*0.4, x + tw*0.25, y - th + lw);
  ctx.lineTo(x + tw - lw*0.7, y - th + lw);
  ctx.quadraticCurveTo(x + tw - lw*0.7, y - th*0.35, x + tw*1.5, y - lw);
  ctx.closePath();
  ctx.fill();
  // canopy blobs: outline pass then fill pass (clean silhouette)
  const blobs = [
    [x - size*0.20, y - size*0.52, size*0.22],
    [x + size*0.20, y - size*0.52, size*0.22],
    [x - size*0.11, y - size*0.70, size*0.235],
    [x + size*0.11, y - size*0.72, size*0.245]
  ];
  for (const b of blobs){
    ctx.fillStyle = '#4da838';
    ctx.beginPath();
    ctx.arc(b[0], b[1], b[2], 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
  for (const b of blobs){
    ctx.beginPath();
    ctx.arc(b[0], b[1], b[2] - lw*0.45, 0, Math.PI*2);
    ctx.fill();
  }
  // darker patch along canopy bottom
  ctx.fillStyle = '#3f8f2c';
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.46, size*0.26, size*0.09, 0, 0, Math.PI*2);
  ctx.fill();
  // highlight blob
  ctx.fillStyle = '#7ed058';
  ctx.beginPath();
  ctx.arc(x - size*0.15, y - size*0.79, size*0.105, 0, Math.PI*2);
  ctx.fill();
  // tiny red fruits
  ctx.fillStyle = '#e0533d';
  ctx.lineWidth = Math.max(1.5, lw*0.5);
  ctx.beginPath();
  ctx.arc(x + size*0.22, y - size*0.60, size*0.035, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(x - size*0.25, y - size*0.46, size*0.035, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawHouseBig(ctx, x, y, size){
  ctx.save();
  const lw = Math.max(2, size*0.035);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = '#3a2417';
  ctx.lineWidth = lw;
  const w = size*0.80, wh = size*0.48, wy = y - wh;
  // chimney (behind roof)
  const chx = x + size*0.21, chw = size*0.11;
  ctx.fillStyle = '#a0713d';
  ctx.beginPath();
  ctx.rect(chx - chw/2, y - size*0.92, chw, size*0.30);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath();
  ctx.rect(chx - chw*0.75, y - size*0.97, chw*1.5, size*0.09);
  ctx.fill(); ctx.stroke();
  // walls
  ctx.fillStyle = '#fff2d0';
  ctx.beginPath();
  ctx.rect(x - w/2, wy, w, wh);
  ctx.fill(); ctx.stroke();
  // wall shade at bottom
  ctx.fillStyle = '#f0ddad';
  ctx.fillRect(x - w/2 + lw*0.5, y - wh*0.24, w - lw, wh*0.24 - lw*0.5);
  // roof with overhang
  const rl = x - w*0.62, rr = x + w*0.62, ry = wy + lw*0.4, ax = x, ay = y - size*0.97;
  ctx.fillStyle = '#e0533d';
  ctx.beginPath();
  ctx.moveTo(rl, ry); ctx.lineTo(ax, ay); ctx.lineTo(rr, ry);
  ctx.closePath();
  ctx.fill();
  // roof underside shade band
  ctx.fillStyle = '#c44532';
  ctx.beginPath();
  ctx.moveTo(rl, ry); ctx.lineTo(rr, ry);
  ctx.lineTo(rr - size*0.10, ry - size*0.07); ctx.lineTo(rl + size*0.10, ry - size*0.07);
  ctx.closePath();
  ctx.fill();
  // roof highlight along left slope
  ctx.strokeStyle = '#f07b5e';
  ctx.lineWidth = lw*0.9;
  ctx.beginPath();
  ctx.moveTo(rl + size*0.10, ry - size*0.085);
  ctx.lineTo(ax - size*0.02, ay + size*0.085);
  ctx.stroke();
  // roof outline
  ctx.strokeStyle = '#3a2417';
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(rl, ry); ctx.lineTo(ax, ay); ctx.lineTo(rr, ry);
  ctx.closePath();
  ctx.stroke();
  // rounded door
  const dw = size*0.20, dh = size*0.30, dx = x - w*0.20;
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath();
  ctx.moveTo(dx - dw/2, y);
  ctx.lineTo(dx - dw/2, y - dh + dw/2);
  ctx.arc(dx, y - dh + dw/2, dw/2, Math.PI, 0);
  ctx.lineTo(dx + dw/2, y);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // knob
  ctx.fillStyle = '#ffd23e';
  ctx.lineWidth = Math.max(1.5, lw*0.5);
  ctx.beginPath();
  ctx.arc(dx + dw*0.24, y - dh*0.42, size*0.024, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.lineWidth = lw;
  // window with cross frame
  const wwx = x + w*0.24, wwy = y - wh*0.60, ws = size*0.17;
  ctx.fillStyle = '#8fd0f5';
  ctx.beginPath();
  ctx.rect(wwx - ws/2, wwy - ws/2, ws, ws);
  ctx.fill();
  ctx.fillStyle = '#5aa8d8';
  ctx.fillRect(wwx - ws/2, wwy, ws, ws/2);
  ctx.stroke();
  ctx.lineWidth = Math.max(1.5, lw*0.6);
  ctx.beginPath();
  ctx.moveTo(wwx - ws/2, wwy); ctx.lineTo(wwx + ws/2, wwy);
  ctx.moveTo(wwx, wwy - ws/2); ctx.lineTo(wwx, wwy + ws/2);
  ctx.stroke();
  ctx.restore();
}

  ctx.beginPath();

  ctx.lineWidth = Math.max(1.5, lw*0.55);

  ctx.lineWidth = lw;
  // dark arched cave mouth
  const mw = size*0.23, mh = size*0.44;

  // skull-ish white pebbles by the mouth
  ctx.lineWidth = Math.max(1.5, lw*0.5);

  ctx.ellipse(x - size*0.32, y - size*0.045, size*0.05, size*0.045, 0, 0, Math.PI*2);

  ctx.fillStyle = '#241830';

}

function drawCoin(ctx, x, y, size, frame){
  ctx.save();
  const cx = x, cy = y - size/2;
  const lw = Math.max(2, size*0.035);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = '#3a2417';
  ctx.lineWidth = lw;
  if (frame === 1){
    // edge-on, mid-spin
    const ry = size*0.5 - lw*0.5;
    ctx.fillStyle = '#e8a800';
    ctx.beginPath();
    ctx.ellipse(cx, cy, size*0.15, ry, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffd23e';
    ctx.beginPath();
    ctx.ellipse(cx - size*0.03, cy, size*0.055, ry*0.8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff3b0';
    ctx.beginPath();
    ctx.ellipse(cx - size*0.03, cy - ry*0.55, size*0.04, ry*0.16, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    // full round coin
    const r = size*0.5 - lw*0.5;
    ctx.fillStyle = '#e8a800';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffd23e';
    ctx.beginPath();
    ctx.arc(cx, cy, r*0.72, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#e8a800';
    ctx.lineWidth = Math.max(1.5, lw*0.7);
    ctx.beginPath();
    ctx.arc(cx, cy, r*0.45, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#fff3b0';
    ctx.beginPath();
    ctx.arc(cx - r*0.38, cy - r*0.38, r*0.19, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ===== 스킬 소환물 아트 =====
function drawTurret(ctx, x, y, size, frame) {
  ctx.save();
  const u = size / 100, lw = Math.max(2, size * 0.035);
  ctx.lineWidth = lw; ctx.strokeStyle = "#3a2417"; ctx.lineJoin = "round"; ctx.lineCap = "round";
  // 돌 받침대
  ctx.fillStyle = "#9aa3ad";
  ctx.beginPath();
  ctx.moveTo(x - 26 * u, y); ctx.lineTo(x - 16 * u, y - 34 * u);
  ctx.lineTo(x + 16 * u, y - 34 * u); ctx.lineTo(x + 26 * u, y);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#c2c9d1";
  ctx.fillRect(x - 12 * u, y - 30 * u, 8 * u, 22 * u);
  // 기둥
  ctx.fillStyle = "#8a5a2b";
  ctx.beginPath(); ctx.rect(x - 7 * u, y - 58 * u, 14 * u, 26 * u); ctx.fill(); ctx.stroke();
  // 마법 수정 (빛나는 하늘색)
  const g = frame ? 1.12 : 1;
  ctx.save(); ctx.globalAlpha = 0.35;
  ctx.fillStyle = "#7cf0ff";
  ctx.beginPath(); ctx.arc(x, y - 76 * u, 24 * u * g, 0, 7); ctx.fill();
  ctx.restore();
  ctx.fillStyle = "#4fd8f0";
  ctx.beginPath();
  ctx.moveTo(x, y - 96 * u);
  ctx.lineTo(x + 14 * u, y - 76 * u);
  ctx.lineTo(x, y - 56 * u);
  ctx.lineTo(x - 14 * u, y - 76 * u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#c8f8ff";
  ctx.beginPath();
  ctx.moveTo(x - 3 * u, y - 88 * u); ctx.lineTo(x + 3 * u, y - 82 * u);
  ctx.lineTo(x - 3 * u, y - 76 * u); ctx.closePath(); ctx.fill();
  ctx.restore();
}

  ctx.beginPath(); ctx.ellipse(x - 6 * u, y - 66 * u, 2.2 * u, 3.2 * u, 0, 0, 7); ctx.fill();

// ===== 소리 (WebAudio — 파일 없이 코드로 생성!) =====
let AC = null, sndOn = true;
function audio() {
  if (!AC) try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  return AC;
}
function tone(freq, dur, type, vol, slide) {
  if (!sndOn || !AC || !freq) return;
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur + 0.02);
  } catch(e) {}
}
const SFX = {
  jump:   () => tone(280, .16, "square", .04, 560),
  coin:   () => { tone(880, .07, "square", .05); setTimeout(() => tone(1318, .1, "square", .05), 70); },
  hit:    () => tone(220, .07, "sawtooth", .06, 90),
  fire:   () => tone(620, .22, "sawtooth", .05, 110),
  skill:  () => tone(480, .12, "triangle", .06, 900),
  hurt:   () => tone(150, .18, "square", .07, 70),
  heal:   () => { tone(523, .1, "triangle", .06); setTimeout(() => tone(784, .14, "triangle", .06), 90); },
  levelup:() => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, .16, "square", .05), i * 95)),
  die:    () => [392, 294, 208, 131].forEach((f, i) => setTimeout(() => tone(f, .22, "square", .06), i * 150)),
  roar:   () => tone(85, .6, "sawtooth", .1, 45),

};
// 신나는 BGM 루프 (E단조풍 모험 멜로디)
const MEL = [330,0,330,392, 440,0,392,0, 330,392,440,523, 494,0,440,0,
             392,0,392,440, 494,0,523,0, 587,523,494,440, 523,0,0,0];
const BASS = [131, 175, 196, 165];
let bgmStep = 0, bgmTimer = null;
function startBgm() {
  if (!audio()) return;
  if (AC.state === "suspended") AC.resume();
  if (bgmTimer) return;
  bgmTimer = setInterval(() => {
    if (!sndOn || !started) return;
    const f = MEL[bgmStep % 32];
    if (f) tone(f, .16, "square", .018);
    if (bgmStep % 8 === 0) tone(BASS[(bgmStep / 8 | 0) % 4], .32, "triangle", .03);
    bgmStep++;
  }, 190);
}

function ensureStats(p) { // 옛날 세이브 호환
  if (typeof p.px !== "number") p.px = 250;
  if (!p.job) p.job = "warrior";
  if (typeof p.qi !== "number") { p.qi = 0; p.qn = 0; p.qA = false; }
  if (typeof p.adv !== "number") p.adv = 1;
  if (typeof p.hard !== "boolean") p.hard = false;
  if (!Array.isArray(p.inv)) p.inv = [];
  if (!p.equip) p.equip = { weapon:null, hat:null, armor:null };
  if (typeof p.crit !== "number") {
    const g = p.lv - 1;
    p.crit = 15 + g * 2; p.critDmg = 1.6 + g * 0.03; p.ied = 10 + g * 3;
    p.bossDmg = g * 4; p.finalD = g * 2;
    p.maxhp = 60 + g * 14; p.maxmp = 30 + g * 6;
    p.hp = Math.min(p.hp, p.maxhp); p.mp = Math.min(p.mp, p.maxmp);
  }
  delete p.mmp; delete p.def;
  return p;
}

const STARBONUS = { weapon:{ k:"atk", v:2 }, hat:{ k:"crit", v:1 }, armor:{ k:"finalD", v:1 } };
const SLOTICON = { weapon:"⚔️", hat:"🎩", armor:"🥋" };

const TIERS = [null,
  { name:"낡은",   atk:[2,4],   o:[2,4] },
  { name:"튼튼한", atk:[5,8],   o:[4,7] },
  { name:"빛나는", atk:[9,13],  o:[7,11] },
  { name:"전설의", atk:[15,22], o:[12,18] },
];
const MOB_TIER = { slime:1, snail:1, mushroom:2, pig:2, bear:3 };
function rollItem(tier) {
  const slot = ["weapon","hat","armor"][Math.floor(Math.random() * 3)];
  const t = TIERS[tier], R = a => a[0] + Math.floor(Math.random() * (a[1] - a[0] + 1));
  const stats = {};
  if (slot === "weapon") stats.atk = R(t.atk);
  else if (slot === "hat") stats.crit = R(t.o);
  else { stats.bossDmg = R(t.o); stats.ied = Math.ceil(R(t.o) / 2); }
  const NM = { weapon:"무기", hat:"모자", armor:"갑옷" };
  return { slot, tier, name: t.name + " " + NM[slot], star:0, stats, pot:null };
}
function eqStat(k) { // 장착한 장비의 능력치 합산
  let v = 0;
  for (const s in P.equip) {
    const it = P.equip[s];
    if (!it) continue;
    v += it.stats[k] || 0;
    if (it.pot && it.pot.k === k) v += it.pot.v;
    if (STARBONUS[s].k === k) v += it.star * STARBONUS[s].v; // ⭐ 스타포스
  }
  return v;
}

function linkBonus() { // 다른 직업 레벨 합 × 0.5% 최종뎀 (최대 30%)

}

// ===== 버프 반영 능력치 (장비 + 전직 패시브 포함) =====
function atkNow()   { return (P.atk + eqStat("atk")) * (buffs.warcry > 0 ? 1.4 : 1) * (P.adv >= 2 ? 1.15 : 1); }
function critNow()  { return Math.min(100, P.crit + eqStat("crit") + (buffs.warcry > 0 ? 20 : 0)); }
function finalNow() { return (1 + (P.finalD + eqStat("finalD") + linkBonus()) / 100) * (buffs.awaken > 0 ? 2 : 1); }

// ===== 데미지 계산 파이프라인 =====
// 공격력 → 스킬 배율 → 최종 데미지 → 크리티컬 → 방어율(IED) → 보스 데미지 → 최종 피해
function calcDamage(mult, target) {
  let d = atkNow() * mult / 100;               // 1. 공격력 × 2. 스킬 배율
  d *= finalNow();                              // 3. 최종 데미지 (곱연산!)
  const crit = Math.random() * 100 < critNow(); // 4. 크리티컬
  if (crit) d *= P.critDmg;
  let defR = target.defRate * (target.curse > 0 ? 0.5 : 1); // 저주 = 방어율 절반
  defR *= 1 - (P.ied + eqStat("ied")) / 100;    // 5. 방어율 무시(IED)
  d *= 1 - defR / 100;                          //    방어율 적용
  if (target.boss) d *= 1 + (P.bossDmg + eqStat("bossDmg")) / 100; // 6. 보스 데미지
  d = Math.max(1, Math.round(d * (0.9 + Math.random() * 0.2)));
  return { d, crit };                           // 7. 최종 피해
}

  $("gamewrap").appendChild(d);

}
