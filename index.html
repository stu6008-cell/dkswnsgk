// ===== 스킬 사용 =====
function useSkill(id) {
  if (!started || dead > 0 || P.clear) return;
  const s = SKILLS[id];
  if ((cds[id] || 0) > 0) return;
  if (id === "adv" && P.adv < 2) { msg("🔒 필살기는 Lv15에 촌장님께 2차 전직하면 배워!"); return; }
  if (P.mp < s.mp) { msg("💧 마나가 부족해!"); return; }
  P.mp -= s.mp;
  cds[id] = s.cd * 60;
  if (id === "fire") SFX.fire(); else if (id !== "potion") SFX.skill();

  if (id === "slash") {
    if (P.job === "mage") { // 마법사: 원거리 매직볼트
      projs.push({ type:"mbolt", x:P.px + facing * 18, y:fy - 44, vx:facing * 8.5, mult:100, r:11 });
    } else if (P.job === "archer") { // 궁수: 원거리 화살
      projs.push({ type:"arrow", x:P.px + facing * 18, y:fy - 44, vx:facing * 10, mult:95, r:9 });
    } else { // 전사: 근접 대검 베기
      fxs.push({ type:"slash", x:P.px + facing * 34, y:fy - 40, dir:facing, t:8 });
      hitBox(P.px + facing * 40, fy - 40, 52, 60, 130, "베기");
    }
  } else if (id === "fire") {
    projs.push({ type:"fire", x:P.px + facing * 18, y:fy - 42, vx:facing * 7.5,
                 mult:P.job === "mage" ? 240 : 190, r:15 });
  } else if (id === "spin") {
    fxs.push({ type:"spin", x:P.px, y:fy - 32, t:16 });
    for (const m of liveTargets()) {
      if (Math.abs(m.x - P.px) < 115 && Math.abs((m.boss ? GY : GY) - fy) < 90) hitOne(m, 150);
    }
  } else if (id === "curse") {
    projs.push({ type:"curse", x:P.px + facing * 18, y:fy - 42, vx:facing * 5.5, r:14 });
  } else if (id === "warcry") {
    buffs.warcry = 15 * 60;
    popDmg("💪 공격력 UP!", P.px, fy - 90, "buff");
  } else if (id === "awaken") {
    buffs.awaken = 8 * 60;
    fxs.push({ type:"awaken", t:24 });
    popDmg("🌟 각성!! 최종 데미지 2배!", P.px, fy - 95, "crit");
    msg("🌟 각성! 8초 동안 최강 화력 — 극딜 타임!!");
  } else if (id === "turret") {
    turretObj = { x:P.px + facing * 36, t:12 * 60, sc:0 };
    popDmg("🗼 설치!", turretObj.x, GY - 70, "buff");
  } else if (id === "fairy") {
    fairyObj = { x:P.px - facing * 26, y:fy - 66, t:20 * 60, sc:0 };
    popDmg("🧚 소환!", P.px, fy - 90, "buff");
  } else if (id === "guard") {
    buffs.guard = 4 * 60;
    popDmg("🛡️ 무적!", P.px, fy - 90, "buff");
  } else if (id === "dash") {
    P.px = Math.max(24, Math.min(WORLD - 24, P.px + facing * 95));
    if (boss && boss.active) P.px = Math.max(ARENA_L + 6, P.px);
    dashI = 26;
    fxs.push({ type:"dash", x:P.px - facing * 48, y:fy, dir:facing, t:10 });
  } else if (id === "adv") { // 💥 2차 전직 필살기
    if (P.job === "warrior") { // 기사: 대지 가르기
      fxs.push({ type:"quake", x:P.px, y:GY, t:20 });
      for (const m of liveTargets()) if (Math.abs(m.x - P.px) < 175) hitOne(m, 240);
    } else if (P.job === "mage") { // 대마법사: 메테오!
      for (let i = 1; i <= 3; i++)
        fmets.push({ x: P.px + facing * (30 + i * 85), y: -20 - i * 35, vy: 8, arrow: false });
    } else { // 저격수: 화살비!
      for (let i = 1; i <= 5; i++)
        fmets.push({ x: P.px + facing * (30 + i * 52), y: -15 - i * 25, vy: 9, arrow: true });
    }
  } else if (id === "potion") {
    if (P.potions <= 0 || P.hp >= P.maxhp) { cds[id] = 0; return; }
    P.potions--;
    const heal = Math.min(60, P.maxhp - P.hp); P.hp += heal;
    popDmg("+" + heal, P.px, fy - 80, "heal");
    SFX.heal();
  }
  updateUI();
}
function liveTargets() {
  const t = mobs.filter(m => m.alive);
  if (boss && boss.active) t.push(boss);
  return t;
}
// 범위 공격 판정
function hitBox(cx, cy, hw, hh, mult, label) {
  for (const m of liveTargets()) {
    const my = GY - (m.boss ? 55 : MOBDEF[m.sprite].fsize / 2);
    if (Math.abs(m.x - cx) < hw + (m.boss ? 45 : 20) && Math.abs(my - cy) < hh) hitOne(m, mult);
  }
}
// 한 마리 타격 (파이프라인 통과)
function hitOne(m, mult) {
  const { d, crit } = calcDamage(mult, m.boss ? boss : { ...MOBDEF[m.sprite], curse:m.curse });
  m.hp -= d; m.hitF = 6;
  SFX.hit();
  const my = m.boss ? GY - 110 : GY - MOBDEF[m.sprite].fsize - 10;
  popDmg(d, m.x, my, crit ? "crit" : "");
  if (!m.boss) {
    m.kb = (m.x < P.px ? -1 : 1) * 5;
    if (m.hp <= 0) killMob(m);
  } else if (boss.hp <= 0) {
    bossDown();
  }
}
function killMob(m) {
  const d = MOBDEF[m.sprite];
  m.alive = false; m.rt = 500; // 몬스터 젠(리스폰)
  P.exp += d.exp; P.gold += d.gold;
  popDmg("+" + d.exp + " EXP", m.x, GY - 66, "buff");
  if (P.qA) { // 퀘스트 카운트
    const q = QUESTS[P.qi];
    if (q && m.sprite === q.need && P.qn < q.n) {
      P.qn++;
      popDmg(`📜 ${P.qn}/${q.n}`, m.x, GY - 92, "buff");
      if (P.qn >= q.n) msg("✅ 퀘스트 목표 달성! 촌장님께 돌아가자!");
    }
  }
  if (Math.random() < 0.18) { P.potions++; popDmg("🧪 물약!", m.x, GY - 46, "heal"); }
  if (Math.random() < 0.09 && P.inv.length < 12) { // 🎁 장비 드랍!
    P.inv.push(rollItem(MOB_TIER[m.sprite]));
    popDmg("🎁 장비 획득!", m.x, GY - 112, "crit");
    SFX.coin();
  }
  levelCheck(); updateUI(); save();
}
function levelCheck() {
  let up = false;
  while (P.exp >= P.lv * 20) {
    P.exp -= P.lv * 20; P.lv++; up = true;
    P.maxhp += 14; P.maxmp += 6; P.atk += 3;
    P.crit += 2; P.critDmg += 0.03; P.ied += 3; P.bossDmg += 4; P.finalD += 2;
    P.hp = P.maxhp; P.mp = P.maxmp;
  }
  if (up) {
    SFX.levelup();
    popDmg("⬆️ LEVEL UP!", P.px, fy - 100, "crit");
    msg(`⬆️ Lv.${P.lv}! 크리${P.crit}% 방무${P.ied}% 보공${P.bossDmg}% 최종뎀${P.finalD}%`);
    saveAcct(); // 유니온(계정) 최고 레벨 기록
    if (P.lv >= 15 && P.adv < 2) setTimeout(() => msg("🌟 Lv.15 달성! 촌장님께 가면 2차 전직할 수 있어!!"), 1500);
  }
}

// ===== 플레이어 피격 =====
function hurtHero(dmg, kbDir) {
  if (dead > 0 || dashI > 0 || hitI > 0 || buffs.guard > 0) return;
  P.hp -= dmg; hitI = 55;
  popDmg(dmg, P.px, fy - 82, "hurt");
  SFX.hurt();
  if (kbDir) P.px = Math.max(24, Math.min(WORLD - 24, P.px + kbDir * 26));
  updateUI();
  if (P.hp <= 0) {
    dead = 100;
    SFX.die();
    msg("💀 쓰러지고 말았다...");
  }
}
function respawn() {
  P.hp = P.maxhp; P.mp = P.maxmp; P.gold = Math.floor(P.gold / 2);
  P.px = HOUSE.x + 60; fy = GY; vy = 0; hitI = 90;
  if (boss) { boss.active = false; }
  msg("골드를 절반 잃었다... 집에서 다시 힘내자!");
  updateUI(); save();
}

// ===== 보스 (패턴 전투) =====
function spawnBoss() {
  const k = P.hard ? 2.2 : 1; // 🔥 하드 모드
  boss = { boss:true, active:true, hp:Math.round(1500 * k), hpMax:Math.round(1500 * k), x:3540, dir:-1,
           defRate:P.hard ? 60 : 50, curse:0, state:"idle", t:90, vx:0, patI:0, hitF:0,
           chargeHit:false, zone:null, phase2:false, dmgK:P.hard ? 1.6 : 1 };
  msg(P.hard ? "🔥🔥 하드 드래곤!! 훨씬 강하다 — 조심해!!" : "🐉 드래곤이 나타났다!! 빨간 경고를 피해!");
  SFX.roar();
}
function bossDown() {
  boss.active = false;
  SFX.levelup(); setTimeout(() => SFX.levelup(), 450); // 승리 팡파레
  // 🎁 보스 레이드 보상: 전설 장비!
  const n = P.hard ? 2 : 1;
  let lootTxt = "";
  for (let i = 0; i < n; i++) {
    if (P.inv.length < 12) { const it = rollItem(4); P.inv.push(it); lootTxt += `<br>🎁 ${it.name} 획득!`; }
  }
  P.gold += P.hard ? 1000 : 300;
  const wasHard = P.hard;
  P.hard = false;
  P.clear = true; saveAcct(); save();
  $("vText").innerHTML = `Lv.${P.lv} 용사가 ${wasHard ? "🔥하드 " : ""}드래곤을 물리쳤다!<br>마을에 평화가 찾아왔다... 🎉<br>💰 +${wasHard ? 1000 : 300} 골드${lootTxt}`;
  $("btnHard").style.display = wasHard ? "none" : "";
  $("victory").classList.remove("hidden");
  drawVictoryScene();
}
function bossTick() {
  const b = boss;
  if (!b.active) return;
  if (!b.phase2 && b.hp < b.hpMax / 2) {
    b.phase2 = true;
    msg("💢 드래곤이 화났다!! 패턴이 빨라진다!");
  }
  const spd = b.phase2 ? 0.72 : 1;
  b.t--;
  b.curse > 0 && b.curse--;

  if (b.state === "idle") {
    b.dir = P.px < b.x ? -1 : 1;
    b.x += b.dir * 1.1;
    b.x = Math.max(ARENA_L + 60, Math.min(WORLD - 50, b.x));
    if (b.t <= 0) {
      const pats = ["charge", "breath", "meteor"];
      const p = pats[b.patI % 3]; b.patI++;
      if (p === "charge") { b.state = "charge_tel"; b.t = 50 * spd; }
      else if (p === "breath") { b.state = "breath_tel"; b.t = 55 * spd;
        b.dir = P.px < b.x ? -1 : 1;
        b.zone = { x1: b.x + b.dir * 40, x2: b.x + b.dir * 250 }; }
      else { b.state = "meteor_tel"; b.t = 62 * spd;
        b.targets = [P.px, P.px - 85, P.px + 85]; }
    }
  } else if (b.state === "charge_tel") {
    if (b.t <= 0) {
      b.state = "charging"; b.t = 42; b.chargeHit = false;
      b.dir = P.px < b.x ? -1 : 1; b.vx = b.dir * (b.phase2 ? 9 : 7.5);
    }
  } else if (b.state === "charging") {
    b.x += b.vx;
    b.x = Math.max(ARENA_L + 40, Math.min(WORLD - 40, b.x));
    if (!b.chargeHit && Math.abs(b.x - P.px) < 60 && fy > GY - 55) {
      b.chargeHit = true; hurtHero(Math.round(45 * b.dmgK), b.dir);
    }
    if (b.t <= 0) { b.state = "idle"; b.t = b.phase2 ? 70 : 110; }
  } else if (b.state === "breath_tel") {
    if (b.t <= 0) { b.state = "breathing"; b.t = 45; }
  } else if (b.state === "breathing") {
    const z = b.zone, lo = Math.min(z.x1, z.x2), hi = Math.max(z.x1, z.x2);
    if (tickN % 12 === 0 && P.px > lo - 12 && P.px < hi + 12 && fy > GY - 46) hurtHero(Math.round(16 * b.dmgK), 0);
    if (b.t <= 0) { b.state = "idle"; b.t = b.phase2 ? 70 : 110; b.zone = null; }
  } else if (b.state === "meteor_tel") {
    if (b.t <= 0) {
      for (const tx of b.targets) meteors.push({ x:tx, y:-30, vy:7.5, boom:0 });
      b.state = "tired"; b.t = 300; // 패턴 끝 = 그로기!
      msg("😵 드래곤이 지쳤다! 지금이 극딜 타임!! (S 각성!)");
    }
  } else if (b.state === "tired") {
    if (b.t <= 0) { b.state = "idle"; b.t = 60; }
  }
  // 몸통 박치기 (돌진 제외 일반 접촉)
  if (b.state !== "charging" && Math.abs(b.x - P.px) < 52 && fy > GY - 60) hurtHero(Math.round(24 * b.dmgK), b.x < P.px ? 1 : -1);
}

// ===== 게임 루프 =====
let prevT = 0;
function tick(t) {
  requestAnimationFrame(tick);
  if (!started || P.clear) return;
  if (t - prevT < 14) return;
  prevT = t;
  tickN++;
  gFrame = (t / 420 | 0) & 1;

  if (dead > 0) { if (--dead === 0) respawn(); drawField(); return; }
  // 대화창·상점·가방 열려 있으면 세상 정지
  if (!$("npc").classList.contains("hidden") || !$("shop").classList.contains("hidden")
      || !$("bag").classList.contains("hidden")) { drawField(); return; }

  // 사다리 잡기
  if (!climbing && (input.u || input.d)) {
    const L = ladderAt();
    if (L && ((input.u && fy > L.y1 + 4) || (input.d && fy < L.y2 - 4))) {
      climbing = L; vy = 0;
      if (input.d && Math.abs(fy - L.y1) < 6) fy += 8; // 꼭대기에서 내려가기 시작
    }
  }
  if (climbing) { // 사다리 타는 중
    const C = climbing;
    if (input.u) { fy -= 2.3; walkT++; }
    if (input.d) { fy += 2.3; walkT++; }
    P.px += (C.x - P.px) * 0.5;
    if (fy <= C.y1) { fy = C.y1; vy = 0; climbing = null; }
    else if (fy >= C.y2) { fy = C.y2; vy = 0; climbing = null; }
    else if (input.l || input.r) climbing = null;
    if (input.jump) { input.jump = false; climbing = null; vy = -7; SFX.jump(); }
  } else {
    // 이동
    if (input.l) { P.px -= 3.1; facing = -1; walkT++; }
    if (input.r) { P.px += 3.1; facing = 1; walkT++; }
    P.px = Math.max(24, Math.min(WORLD - 24, P.px));
    if (boss && boss.active) P.px = Math.max(ARENA_L + 6, P.px); // 보스방 잠금
    if (input.jump) { input.jump = false; if (vy === 0) { vy = -10.5; SFX.jump(); } }
    const prevFy = fy;
    vy += 0.55; fy += vy;
    if (vy > 0) for (const p of PLATS) {
      if (prevFy <= p.y && fy >= p.y && P.px > p.x - 8 && P.px < p.x + p.w * 64 + 8) { fy = p.y; vy = 0; }
    }
    if (fy >= GY) { fy = GY; vy = 0; }
  }

  // 지역 레벨 제한
  for (const g of GATES) if (P.lv < g.lv && P.px > g.x - 4) {
    P.px = g.x - 6;
    msg(`🚧 ${g.name}은 Lv.${g.lv}부터! 사냥으로 레벨을 올리자!`);
  }

  // 타이머들
  if (hitI > 0) hitI--;
  if (dashI > 0) dashI--;
  if (healCd > 0) healCd--;
  for (const k in buffs) if (buffs[k] > 0) buffs[k]--;
  for (const k in cds) if (cds[k] > 0) cds[k]--;
  if (tickN % 60 === 0 && P.mp < P.maxmp) { P.mp++; updateUI(); } // 마나 재생

  // 존 안내
  let zi = 0;
  for (let i = 0; i < ZONES.length; i++) if (P.px >= ZONES[i][0]) zi = i;
  if (zi !== zoneIdx) { zoneIdx = zi; msg(ZONES[zi][1]); }

  // 집 회복
  if (Math.abs(P.px - HOUSE.x) < 60 && healCd <= 0 && (P.hp < P.maxhp || P.mp < P.maxmp)) {
    P.hp = P.maxhp; P.mp = P.maxmp; healCd = 240;
    msg("🏠 집에서 푹 쉬었다. 완전 회복!");
    SFX.heal();
    updateUI(); save();
  }
  // 촌장 NPC (가까이 가면 대화)
  if (npcCd > 0) npcCd--;
  if (npcCd <= 0 && Math.abs(P.px - NPCX) < 40 && fy === GY && (!boss || !boss.active)) openNpc();
  // 코인
  for (const c of coins) {
    if (!c.taken && Math.abs(c.x - P.px) < 24 && c.y > fy - 74 && c.y < fy + 6) {
      c.taken = true; P.gold += 8; popDmg("+8G", c.x, c.y - 16, ""); SFX.coin(); updateUI();
    }
  }

  // 몬스터 (순찰 + 어그로 + 접촉 데미지)
  for (const m of mobs) {
    if (!m.alive) { if (--m.rt <= 0) { m.alive = true; m.hp = MOBDEF[m.sprite].hp; m.x = m.ax; m.curse = 0; } continue; }
    if (m.hitF > 0) m.hitF--;
    if (m.curse > 0) m.curse--;
    if (m.kb) { m.x += m.kb; m.kb *= 0.75; if (Math.abs(m.kb) < 0.4) m.kb = 0; }
    else {
      const slow = m.curse > 0 ? 0.5 : 1;
      const aggro = Math.abs(m.x - P.px) < 170 && dead <= 0;
      if (aggro) m.dir = P.px < m.x ? -1 : 1;
      m.x += m.dir * MOB_SPD[m.sprite] * (aggro ? 1.7 : 1) * slow;
      if (!aggro && Math.abs(m.x - m.ax) > 130) m.dir *= -1;
    }
    if (Math.abs(m.x - P.px) < 26 && fy > GY - 45) hurtHero(MOBDEF[m.sprite].touch, m.x < P.px ? 1 : -1);
  }

  // 투사체
  for (const p of projs) {
    p.x += p.vx;
    for (const m of liveTargets()) {
      const hw = m.boss ? 50 : 22;
      if (Math.abs(m.x - p.x) < hw && (m.boss ? true : true)) {
        if (p.type === "curse") {
          m.curse = 8 * 60;
          popDmg("🕸️ 저주! 방어율 절반!", m.x, GY - (m.boss ? 120 : 70), "curse");
        } else hitOne(m, p.mult);
        p.dead = true; break;
      }
    }
    if (Math.abs(p.x - P.px) > 400) p.dead = true;
  }
  projs = projs.filter(p => !p.dead);

  // 설치기 (포탑)
  if (turretObj) {
    turretObj.t--; turretObj.sc--;
    if (turretObj.sc <= 0) {
      let best = null, bd = 210;
      for (const m of liveTargets()) {
        const d = Math.abs(m.x - turretObj.x);
        if (d < bd) { bd = d; best = m; }
      }
      if (best) {
        turretObj.sc = 42;
        projs.push({ type:"bolt", x:turretObj.x, y:GY - 44, vx:(best.x > turretObj.x ? 1 : -1) * 8, mult:80, r:9 });
      }
    }
    if (turretObj.t <= 0) turretObj = null;
  }
  // 소환수 (요정)
  if (fairyObj) {
    fairyObj.t--; fairyObj.sc--;
    fairyObj.x += (P.px - facing * 30 - fairyObj.x) * 0.08;
    fairyObj.y += (fy - 70 + Math.sin(tickN / 18) * 6 - fairyObj.y) * 0.1;
    if (fairyObj.sc <= 0) {
      let best = null, bd = 170;
      for (const m of liveTargets()) {
        const d = Math.abs(m.x - fairyObj.x);
        if (d < bd) { bd = d; best = m; }
      }
      if (best) {
        fairyObj.sc = 60;
        projs.push({ type:"bolt", x:fairyObj.x, y:fairyObj.y, vx:(best.x > fairyObj.x ? 1 : -1) * 7, mult:70, r:8 });
      }
    }
    if (fairyObj.t <= 0) fairyObj = null;
  }

  // 운석
  for (const mt of meteors) {
    if (mt.boom > 0) { mt.boom--; continue; }
    mt.y += mt.vy;
    if (mt.y >= GY) {
      mt.y = GY; mt.boom = 14; SFX.meteor();
      if (Math.abs(mt.x - P.px) < 52 && fy > GY - 40) hurtHero(150, 0); // 즉사급!
    }
  }
  meteors = meteors.filter(mt => mt.boom !== 1);
  // 아군 필살기 낙하 (메테오/화살비)
  for (const fm of fmets) {
    if (fm.boom > 0) { fm.boom--; continue; }
    fm.y += fm.vy;
    if (fm.y >= GY) {
      fm.y = GY; fm.boom = 12; SFX.hit();
      for (const m of liveTargets()) if (Math.abs(m.x - fm.x) < 70) hitOne(m, fm.arrow ? 150 : 260);
    }
  }
  fmets = fmets.filter(fm => fm.boom !== 1);

  // 보스
  if (!P.clear) {
    if ((!boss || !boss.active) && P.px > ARENA_L + 30 && dead <= 0) spawnBoss();
    if (boss && boss.active) bossTick();
  }

  // 이펙트 수명
  for (const f of fxs) f.t--;
  fxs = fxs.filter(f => f.t > 0);

  drawField();
  if (tickN % 6 === 0) refreshCds();
}
requestAnimationFrame(tick);

// ===== 필드 배경 =====
const bgLow = document.createElement("canvas"); bgLow.width = 240; bgLow.height = 180;
const bgg = bgLow.getContext("2d");
function drawFieldBg(camX) {
  const sky = bgg.createLinearGradient(0, 0, 0, 150);
  sky.addColorStop(0, "#8fd7ff"); sky.addColorStop(1, "#ddf4ff");
  bgg.fillStyle = sky; bgg.fillRect(0, 0, 240, 150);
  bgg.fillStyle = "#fff3b0";
  bgg.beginPath(); bgg.arc(205, 26, 13, 0, 7); bgg.fill();
  bgg.fillStyle = "rgba(255,255,255,.95)";
  for (const [bx, by, sc] of [[40,30,1],[160,18,.7],[280,42,.85],[420,25,1.1]]) {
    const cx = ((bx - camX * 0.06) % 520 + 520) % 520 - 40;
    bgg.beginPath();
    bgg.arc(cx - 11*sc, by, 7*sc, 0, 7); bgg.arc(cx, by - 4*sc, 9*sc, 0, 7);
    bgg.arc(cx + 11*sc, by, 6.5*sc, 0, 7); bgg.arc(cx, by + 2*sc, 8*sc, 0, 7);
    bgg.fill();
  }
  bgg.fillStyle = "#b2e08a";
  for (let hx = -1; hx < 12; hx++) {
    const cx = ((hx * 210 - camX * 0.3) % 2520 + 2520) % 2520 - 210;
    bgg.beginPath(); bgg.ellipse(cx, 152, 130, 38, 0, Math.PI, 0); bgg.fill();
  }
  bgg.fillStyle = "#9cd46e";
  for (let hx = -1; hx < 12; hx++) {
    const cx = ((hx * 260 + 90 - camX * 0.45) % 3120 + 3120) % 3120 - 260;
    bgg.beginPath(); bgg.ellipse(cx, 154, 110, 30, 0, Math.PI, 0); bgg.fill();
  }
  bgg.fillStyle = "#8ccb60"; bgg.fillRect(0, 150, 240, 30);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bgLow, 0, 0, W, H);
}

// ===== 필드 그리기 =====
function drawField() {
  const camX = camNow();
  drawFieldBg(camX);
  for (let wx = Math.floor(camX / 64) * 64; wx < camX + W + 64; wx += 64) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(groundPix(((wx / 64) % 4 + 4) % 4), wx - camX, GY, 64, 64);
  }
  for (const [tx, ts] of TREES) if (tx > camX - 90 && tx < camX + W + 90) drawPix(ctx, "treeBig", tx - camX, GY + 2, ts, 0);
  drawPix(ctx, "houseBig", HOUSE.x - camX, GY + 2, HOUSE.size, 0);
  drawPix(ctx, "caveBig", CAVE.x - camX, GY + 2, CAVE.size, 0);
  for (const [bx, bs] of BUSHES) if (bx > camX - 50 && bx < camX + W + 50) drawPix(ctx, "bush", bx - camX, GY + 2, bs, 0);
  // 촌장 NPC (+ 퀘스트 말풍선)
  if (NPCX > camX - 60 && NPCX < camX + W + 60) {
    drawPix(ctx, "npc", NPCX - camX, GY + 2, 58, gFrame);
    const q = QUESTS[P.qi];
    if (q && (!P.qA || P.qn >= q.n)) {
      const mark = P.qA ? "?" : "!";
      const my2 = GY - 66 + Math.sin(tickN / 10) * 3;
      ctx.font = "900 22px sans-serif"; ctx.textAlign = "center";
      ctx.lineWidth = 5; ctx.strokeStyle = "#fff";
      ctx.strokeText(mark, NPCX - camX, my2);
      ctx.fillStyle = P.qA ? "#2f8fe8" : "#ffb000";
      ctx.fillText(mark, NPCX - camX, my2);
    }
  }
  // 사다리
  for (const L of LADDERS) {
    if (L.x < camX - 20 || L.x > camX + W + 20) continue;
    const lx = L.x - camX;
    ctx.strokeStyle = "#8a5a2b"; ctx.lineWidth = 3.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(lx - 7, L.y1 + 2); ctx.lineTo(lx - 7, L.y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx + 7, L.y1 + 2); ctx.lineTo(lx + 7, L.y2); ctx.stroke();
    ctx.strokeStyle = "#a0713d"; ctx.lineWidth = 3;
    for (let ry = L.y1 + 8; ry < L.y2 - 2; ry += 13) {
      ctx.beginPath(); ctx.moveTo(lx - 7, ry); ctx.lineTo(lx + 7, ry); ctx.stroke();
    }
  }
  for (const p of PLATS) {
    if (p.x + p.w * 64 < camX || p.x > camX + W) continue;
    for (let i = 0; i < p.w; i++) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(groundPix((i + 1) % 4), 0, 0, 64, 40, p.x + i * 64 - camX, p.y, 64, 40);
    }
  }
  for (const c of coins) {
    if (c.taken || c.x < camX - 40 || c.x > camX + W + 40) continue;
    const bob = Math.sin(performance.now() / 300 + c.x) * 3;
    drawPix(ctx, "coin", c.x - camX, c.y + bob, 26, (performance.now() / 240 | 0) % 2);
  }

  // 보스 경고 표시 (바닥)
  if (boss && boss.active) {
    if (boss.state === "breath_tel" || boss.state === "breathing") {
      const z = boss.zone, lo = Math.min(z.x1, z.x2), hi = Math.max(z.x1, z.x2);
      ctx.fillStyle = boss.state === "breath_tel" ? "rgba(255,60,40,.30)" : "rgba(255,120,20,.45)";
      ctx.fillRect(lo - camX, GY - 52, hi - lo, 54);
      ctx.strokeStyle = "rgba(255,60,40,.8)"; ctx.lineWidth = 2;
      ctx.strokeRect(lo - camX, GY - 52, hi - lo, 54);
    }
    if (boss.state === "meteor_tel") {
      for (const tx of boss.targets) {
        ctx.fillStyle = "rgba(255,60,40,.35)";
        ctx.beginPath(); ctx.ellipse(tx - camX, GY, 50, 10, 0, 0, 7); ctx.fill();
        ctx.strokeStyle = "rgba(255,60,40,.9)"; ctx.lineWidth = 2; ctx.stroke();
      }
    }
  }

  // 포탑
  if (turretObj) drawPix(ctx, "turret", turretObj.x - camX, GY + 2, 52, gFrame);

  // 몬스터 + HP바
  for (const m of mobs) {
    if (!m.alive || m.x < camX - 80 || m.x > camX + W + 80) continue;
    const d = MOBDEF[m.sprite];
    const fl = m.hitF > 0;
    drawPix(ctx, m.sprite, m.x - camX, GY + 2, d.fsize, gFrame, m.dir > 0, fl ? 0.6 : 1);
    if (m.hp < d.hp) {
      const bx = m.x - camX - 16, by = GY - d.fsize - 12;
      ctx.fillStyle = "#3a2417"; ctx.fillRect(bx - 1, by - 1, 34, 6);
      ctx.fillStyle = "#ff4d4d"; ctx.fillRect(bx, by, 32 * Math.max(0, m.hp / d.hp), 4);
    }
    if (m.curse > 0) { ctx.fillStyle = "#c07ce8"; ctx.font = "900 12px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("🕸", m.x - camX, GY - d.fsize - 18); }
  }

  // 보스
  if (boss && boss.active) {
    const bx = boss.x - camX;
    const shakeX = boss.state === "charge_tel" ? Math.sin(tickN) * 3 : 0;
    const dy = boss.state === "tired" ? 6 : 0;
    drawPix(ctx, "dragon", bx + shakeX, GY + 2 + dy, 120, gFrame, boss.dir > 0, boss.hitF > 0 ? 0.6 : 1);
    if (boss.state === "charge_tel" || boss.state === "breath_tel" || boss.state === "meteor_tel") {
      ctx.font = "900 26px sans-serif"; ctx.textAlign = "center";
      ctx.lineWidth = 4; ctx.strokeStyle = "#fff";
      ctx.strokeText("!", bx, GY - 135); ctx.fillStyle = "#e8210c"; ctx.fillText("!", bx, GY - 135);
    }
    if (boss.state === "tired") {
      ctx.font = "900 16px sans-serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#5a3300"; ctx.fillText("😵 그로기!", bx, GY - 140);
    }
    // 보스 HP바 (화면 상단)
    ctx.fillStyle = "rgba(58,36,23,.85)"; ctx.fillRect(40, 12, 400, 20);
    ctx.fillStyle = "#ff4d4d"; ctx.fillRect(43, 15, 394 * Math.max(0, boss.hp / boss.hpMax), 14);
    ctx.font = "900 12px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "#fff";
    ctx.fillText((P.hard ? "🔥 하드 드래곤" : "🐉 드래곤") + (boss.phase2 ? " (분노!)" : ""), 240, 26);
  }

  // 요정
  if (fairyObj) drawPix(ctx, "fairy", fairyObj.x - camX, fairyObj.y + 20, 34, gFrame);

  // 용사
  if (dead > 0) {
    drawPix(ctx, heroKey(), P.px - camX, fy + 2, 64, 1, facing < 0, 0.6);
  } else if (hitI <= 0 || (hitI >> 3) % 2 === 0) {
    const wf = (input.l || input.r) ? (walkT >> 3) & 1 : gFrame;
    drawPix(ctx, heroKey(), P.px - camX, fy + 2, 64, wf, facing < 0);
    if (buffs.guard > 0) { // 무적 보호막
      ctx.strokeStyle = "rgba(255,210,62," + (0.55 + Math.sin(tickN / 4) * 0.25) + ")";
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(P.px - camX, fy - 34, 46, 0, 7); ctx.stroke();
    }
    if (buffs.awaken > 0) { // 각성 오라
      ctx.strokeStyle = "rgba(255,160,32,.7)"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(P.px - camX, fy - 32, 40 + Math.sin(tickN / 3) * 4, 0, 7); ctx.stroke();
    }
  }

  // 투사체
  for (const p of projs) {
    const px = p.x - camX;
    if (p.type === "fire") {
      ctx.fillStyle = "#ff9d1a"; ctx.beginPath(); ctx.arc(px, p.y, 13, 0, 7); ctx.fill();
      ctx.fillStyle = "#ffe37a"; ctx.beginPath(); ctx.arc(px - p.vx, p.y - 3, 6, 0, 7); ctx.fill();
    } else if (p.type === "curse") {
      ctx.fillStyle = "#8a4fc8"; ctx.beginPath(); ctx.arc(px, p.y, 11, 0, 7); ctx.fill();
      ctx.fillStyle = "#c07ce8"; ctx.beginPath(); ctx.arc(px, p.y, 6, 0, 7); ctx.fill();
    } else if (p.type === "mbolt") { // 마법사 볼트
      ctx.fillStyle = "rgba(124,197,255,.5)"; ctx.beginPath(); ctx.arc(px, p.y, 13, 0, 7); ctx.fill();
      ctx.fillStyle = "#e8f4ff"; ctx.beginPath(); ctx.arc(px, p.y, 8, 0, 7); ctx.fill();
      ctx.fillStyle = "#8a6fd8"; ctx.beginPath(); ctx.arc(px - p.vx * 0.8, p.y, 4, 0, 7); ctx.fill();
    } else if (p.type === "arrow") { // 궁수 화살
      const dr = p.vx > 0 ? 1 : -1;
      ctx.strokeStyle = "#8a5a2b"; ctx.lineWidth = 4; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(px - dr * 16, p.y); ctx.lineTo(px + dr * 10, p.y); ctx.stroke();
      ctx.fillStyle = "#e8eef8";
      ctx.beginPath(); ctx.moveTo(px + dr * 17, p.y);
      ctx.lineTo(px + dr * 8, p.y - 4); ctx.lineTo(px + dr * 8, p.y + 4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#8bd06a";
      ctx.fillRect(px - dr * 20, p.y - 4, dr * 6, 8);
    } else {
      ctx.fillStyle = "#7cf0ff"; ctx.beginPath(); ctx.arc(px, p.y, 7, 0, 7); ctx.fill();
    }
  }
  // 운석
  for (const mt of meteors) {
    const mx = mt.x - camX;
    if (mt.boom > 0) {
      ctx.strokeStyle = "rgba(255,120,20,.8)"; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(mx, GY - 8, (15 - mt.boom) * 5, 0, 7); ctx.stroke();
    } else {
      ctx.fillStyle = "#ff5c1a"; ctx.beginPath(); ctx.arc(mx, mt.y, 17, 0, 7); ctx.fill();
      ctx.fillStyle = "#ffe37a"; ctx.beginPath(); ctx.arc(mx, mt.y - 6, 8, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(255,140,40,.5)"; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(mx, mt.y - 20); ctx.lineTo(mx, mt.y - 52); ctx.stroke();
    }
  }
  // 아군 필살기 낙하 (메테오/화살비)
  for (const fm of fmets) {
    const fx3 = fm.x - camX;
    if (fm.boom > 0) {
      ctx.strokeStyle = fm.arrow ? "rgba(139,208,106,.8)" : "rgba(124,197,255,.8)"; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(fx3, GY - 8, (13 - fm.boom) * 5, 0, 7); ctx.stroke();
    } else if (fm.arrow) {
      ctx.strokeStyle = "#8a5a2b"; ctx.lineWidth = 4; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(fx3, fm.y - 24); ctx.lineTo(fx3, fm.y); ctx.stroke();
      ctx.fillStyle = "#e8eef8";
      ctx.beginPath(); ctx.moveTo(fx3, fm.y + 8);
      ctx.lineTo(fx3 - 4, fm.y - 2); ctx.lineTo(fx3 + 4, fm.y - 2); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = "#7cc5ff"; ctx.beginPath(); ctx.arc(fx3, fm.y, 15, 0, 7); ctx.fill();
      ctx.fillStyle = "#e8f4ff"; ctx.beginPath(); ctx.arc(fx3, fm.y - 5, 7, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(124,197,255,.5)"; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(fx3, fm.y - 18); ctx.lineTo(fx3, fm.y - 48); ctx.stroke();
    }
  }
  // 입장 제한선 (레벨 부족할 때만 보임)
  for (const g of GATES) {
    if (P.lv >= g.lv || g.x < camX - 20 || g.x > camX + W + 20) continue;
    const gx = g.x - camX;
    ctx.strokeStyle = "rgba(230,50,40,.75)"; ctx.lineWidth = 4; ctx.setLineDash([10, 8]);
    ctx.beginPath(); ctx.moveTo(gx, GY - 130); ctx.lineTo(gx, GY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = "900 13px sans-serif"; ctx.textAlign = "center";
    ctx.fillStyle = "#fff"; ctx.strokeStyle = "#c62828"; ctx.lineWidth = 3;
    ctx.strokeText("Lv." + g.lv, gx, GY - 138); ctx.fillText("Lv." + g.lv, gx, GY - 138);
  }
  // 스킬 이펙트
  for (const f of fxs) {
    if (f.type === "slash") {
      ctx.strokeStyle = "rgba(255,255,255," + f.t / 8 + ")"; ctx.lineWidth = 5; ctx.lineCap = "round";
      const fx2 = f.x - camX;
      ctx.beginPath(); ctx.arc(fx2, f.y, 34, -1.2 * f.dir, 1.2 * f.dir, f.dir < 0); ctx.stroke();
    } else if (f.type === "spin") {
      ctx.strokeStyle = "rgba(120,220,255," + f.t / 16 + ")"; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.arc(f.x - camX, f.y, (17 - f.t) * 8, 0, 7); ctx.stroke();
    } else if (f.type === "dash") {
      ctx.strokeStyle = "rgba(255,255,255," + f.t / 10 * 0.7 + ")"; ctx.lineWidth = 3;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath(); ctx.moveTo(f.x - camX - f.dir * i * 14, f.y - 20 - i * 12);
        ctx.lineTo(f.x - camX - f.dir * (i * 14 + 26), f.y - 20 - i * 12); ctx.stroke();
      }
    } else if (f.type === "awaken") {
      ctx.fillStyle = "rgba(255,200,60," + f.t / 24 * 0.25 + ")";
      ctx.fillRect(0, 0, W, H);
    } else if (f.type === "quake") { // 기사 대지 가르기
      const r = (21 - f.t) * 9;
      ctx.strokeStyle = "rgba(160,113,61," + f.t / 20 + ")"; ctx.lineWidth = 7;
      ctx.beginPath(); ctx.ellipse(f.x - camX, GY, r, r * 0.25, 0, 0, 7); ctx.stroke();
      ctx.strokeStyle = "rgba(255,210,62," + f.t / 20 * 0.8 + ")"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(f.x - camX, GY, r * 0.7, r * 0.18, 0, 0, 7); ctx.stroke();
    }
  }
  // 버프 아이콘 (좌상단)
  let bi = 0;
  ctx.font = "900 13px sans-serif"; ctx.textAlign = "left";
  for (const [k, icon] of [["warcry","💪"],["awaken","🌟"],["guard","🛡️"]]) {
    if (buffs[k] > 0) {
      ctx.fillStyle = "rgba(247,231,195,.9)";
      ctx.fillRect(8 + bi * 62, 40, 56, 22);
      ctx.strokeStyle = "#8a5a2b"; ctx.lineWidth = 2; ctx.strokeRect(8 + bi * 62, 40, 56, 22);
      ctx.fillStyle = "#5a3300";
      ctx.fillText(icon + " " + Math.ceil(buffs[k] / 60), 13 + bi * 62, 56);
      bi++;
    }
  }
  // 미니맵 (보스전 중엔 보스 HP바 자리라 숨김)
  if (!boss || !boss.active) {
    const mx0 = W - 132, my0 = 8, mw = 124, mh = 26;
    ctx.fillStyle = "rgba(247,231,195,.88)";
    ctx.fillRect(mx0, my0, mw, mh);
    ctx.strokeStyle = "#8a5a2b"; ctx.lineWidth = 2; ctx.strokeRect(mx0, my0, mw, mh);
    const sc = (mw - 10) / WORLD, bx0 = mx0 + 5, by0 = my0 + mh / 2;
    ctx.fillStyle = "#8bd06a"; ctx.fillRect(bx0, by0 + 5, mw - 10, 3);
    ctx.fillStyle = "#e0533d"; ctx.fillRect(bx0 + HOUSE.x * sc - 2, by0 - 2, 5, 5);
    ctx.fillStyle = "#6a3fa0"; ctx.fillRect(bx0 + CAVE.x * sc - 2, by0 - 2, 5, 5);
    ctx.fillStyle = "#c62828";
    for (const m of mobs) if (m.alive) ctx.fillRect(bx0 + m.x * sc - 1, by0 + 1, 2, 2);
    ctx.fillStyle = "#ffb000";
    ctx.fillRect(bx0 + P.px * sc - 2, by0 - 2, 4, 6); // 나!
    if (P.qA) { // 퀘스트 진행 표시
      const q = QUESTS[P.qi];
      ctx.font = "900 11px sans-serif"; ctx.textAlign = "right"; ctx.fillStyle = "#5a3300";
      ctx.fillText(`📜 ${q.txt.split(" ")[0]} ${P.qn}/${q.n}`, mx0 + mw, my0 + mh + 13);
    }
  }
}

const KEY2SKILL = {};
for (const id in SKILLS) for (const k of SKILLS[id].keys) KEY2SKILL[k] = id;
document.addEventListener("keydown", e => {
  if (e.code === "ArrowLeft") { input.l = true; e.preventDefault(); }
  else if (e.code === "ArrowRight") { input.r = true; e.preventDefault(); }
  else if (e.code === "ArrowUp") { // 사다리 앞에선 오르기, 아니면 점프
    input.u = true;
    if (!e.repeat && !ladderAt() && !climbing) input.jump = true;
    e.preventDefault();
  }
  else if (e.code === "ArrowDown") { input.d = true; e.preventDefault(); }
  else if (e.code === "Space") { if (!e.repeat) input.jump = true; e.preventDefault(); }
  else if (KEY2SKILL[e.code]) { if (!e.repeat) useSkill(KEY2SKILL[e.code]); e.preventDefault(); }
});
document.addEventListener("keyup", e => {
  if (e.code === "ArrowLeft") input.l = false;
  else if (e.code === "ArrowRight") input.r = false;
  else if (e.code === "ArrowUp") input.u = false;
  else if (e.code === "ArrowDown") input.d = false;
});
function holdBtn(id, on, off) {
  const el = $(id);
  el.addEventListener("pointerdown", e => { e.preventDefault(); on(); });
  for (const ev of ["pointerup", "pointercancel", "pointerleave"])
    el.addEventListener(ev, e => { e.preventDefault(); off(); });
}
holdBtn("left",  () => input.l = true,  () => input.l = false);
holdBtn("right", () => input.r = true,  () => input.r = false);
holdBtn("up", () => { input.u = true; if (!ladderAt() && !climbing) input.jump = true; }, () => input.u = false);
holdBtn("down", () => input.d = true, () => input.d = false);

});

function statStr(it) {
  return Object.entries(it.stats).map(([k, v]) => STATKO[k] + "+" + v + (k === "atk" ? "" : "%")).join(" ");
}
function potStr(p) { return STATKO[p.k] + "+" + p.v + (p.k === "atk" ? "" : "%"); }
function renderBag() {
  const eqDiv = $("eqSlots"); eqDiv.innerHTML = "";
  for (const s of ["weapon", "hat", "armor"]) {
    const it = P.equip[s];
    const row = document.createElement("div"); row.className = "shoprow";
    const left = document.createElement("span");
    left.style.fontSize = "12.5px";
    left.textContent = SLOTICON[s] + " " + (it
      ? `${it.name} ⭐${it.star} (${statStr(it)})${it.pot ? " 🔷" + potStr(it.pot) : ""}`
      : "(비어있음)");
    const right = document.createElement("span");
    if (it) {
      const cost = (it.star + 1) * 80;
      const b1 = document.createElement("button");
      b1.textContent = it.star >= 10 ? "⭐MAX" : `⭐${cost}G`;
      b1.addEventListener("click", () => {
        if (it.star >= 10) { msg("⭐ 이미 최대 강화야! (10성)"); return; }
        if (P.gold < cost) { msg("💰 골드가 부족해!"); SFX.hurt(); return; }
        P.gold -= cost;
        if (Math.random() < Math.max(0.35, 0.95 - it.star * 0.08)) {
          it.star++; SFX.levelup(); msg(`⭐ 강화 성공! ${it.name} ${it.star}성!!`);
        } else { SFX.hurt(); msg("💥 강화 실패... 골드만 날아갔다. 다시 도전!"); }
        updateUI(); save(); renderBag();
      });
      const b2 = document.createElement("button");
      b2.textContent = "🔷150G";
      b2.addEventListener("click", () => {
        if (P.gold < 150) { msg("💰 골드가 부족해!"); SFX.hurt(); return; }
        P.gold -= 150;
        const ks = ["atk", "crit", "bossDmg", "finalD"];
        const k = ks[Math.floor(Math.random() * ks.length)];
        it.pot = { k, v: (k === "atk" ? 3 : 4) + Math.floor(Math.random() * (it.tier * 3 + 3)) };
        SFX.skill(); msg(`🔷 잠재능력 등장: ${potStr(it.pot)}!`);
        updateUI(); save(); renderBag();
      });
      right.append(b1, b2);
    }
    row.append(left, right);
    eqDiv.appendChild(row);
  }
  const inv = $("invRows"); inv.innerHTML = "";
  if (!P.inv.length) {
    inv.innerHTML = '<p style="font-size:12px;color:#a08a60">인벤토리가 비었어 — 몬스터를 잡으면 🎁 장비가 떨어져!</p>';
    return;
  }
  P.inv.forEach((it, i) => {
    const row = document.createElement("div"); row.className = "shoprow";
    const left = document.createElement("span");
    left.style.fontSize = "12.5px";
    left.textContent = `${SLOTICON[it.slot]} ${it.name} (${statStr(it)})`;
    const right = document.createElement("span");
    const b1 = document.createElement("button"); b1.textContent = "장착";
    b1.addEventListener("click", () => {
      const old = P.equip[it.slot];
      P.equip[it.slot] = it;
      P.inv.splice(i, 1);
      if (old) P.inv.push(old);
      SFX.coin(); updateUI(); save(); renderBag();
    });
    const b2 = document.createElement("button"); b2.textContent = "팔기 " + it.tier * 15 + "G";
    b2.addEventListener("click", () => {
      P.inv.splice(i, 1); P.gold += it.tier * 15;
      SFX.coin(); updateUI(); save(); renderBag();
    });
    right.append(b1, b2);
    row.append(left, right);
    inv.appendChild(row);
  });
}
$("btnBag").addEventListener("click", () => {
  if (!started) return;
  renderBag();
  $("bag").classList.remove("hidden");
});
$("btnBagClose").addEventListener("click", () => $("bag").classList.add("hidden"));

// ===== 🌟 2차 전직 =====
const ADV_NAME = { warrior:"기사", mage:"대마법사", archer:"저격수" };
$("btnAdv").addEventListener("click", () => {
  P.adv = 2;
  SFX.levelup(); setTimeout(() => SFX.levelup(), 400);
  msg(`🌟 2차 전직 완료! 이제 너는 [${ADV_NAME[P.job]}]! 필살기(G) 해금 + 공격력 +15%!`);
  $("npc").classList.add("hidden");
  updateUI(); refreshCds(); save();
});

// ===== 🔥 하드 보스 재도전 =====
$("btnHard").addEventListener("click", () => {
  P.clear = false; P.hard = true;
  P.px = 3100; fy = GY; vy = 0; hitI = 90; boss = null;
  P.hp = P.maxhp; P.mp = P.maxmp;
  $("victory").classList.add("hidden");
  msg("🔥 하드 드래곤에게 도전한다!! 각오해!");
  updateUI(); save();
});

// ===== 시작 =====
const SLASH_UI = { warrior:["⚔️","베기"], mage:["✨","볼트"], archer:["🏹","화살"] };
function begin(data) {
  P = ensureStats(data); started = true; dead = 0;
  fy = GY; vy = 0; hitI = 60; zoneIdx = -1;
  climbing = null; npcCd = 90;
  projs = []; meteors = []; fmets = []; fxs = []; turretObj = null; fairyObj = null; boss = null;
  startBgm(); // 클릭(사용자 동작) 안에서 호출되므로 오디오 시작 가능
  saveAcct(); // 유니온 기록
  if (linkBonus() > 0) setTimeout(() => msg(`🔗 링크 스킬! 다른 직업 캐릭터들 덕분에 최종 데미지 +${linkBonus()}%`), 1200);
  for (const k in buffs) buffs[k] = 0;
  for (const k in cds) cds[k] = 0;
  resetMobs(); resetCoins();
  const [ic, nm] = SLASH_UI[P.job] || SLASH_UI.warrior; // 직업별 기본공격 버튼
  $("sk_slash").innerHTML = `<span class="ky">Z</span><span class="ic">${ic}</span>${nm}` +
                            `<i class="cdov"></i><span class="cds"></span>`;
  $("title").classList.add("hidden");
  updateUI(); refreshCds(); drawField();
}
// 직업 선택
const JOB_BONUS = {
  warrior: d => { d.maxhp += 25; d.hp = d.maxhp; },
  mage:    d => { d.maxmp += 25; d.mp = d.maxmp; },
  archer:  d => { d.crit += 12; },
};
for (const j of ["warrior", "mage", "archer"]) {
  $("job_" + j).addEventListener("click", () => {
    try { localStorage.removeItem("rpg_save"); } catch(e) {}
    const d = { ...START, job:j };
    JOB_BONUS[j](d);
    begin(d);
  });
}
function drawJobPreviews() {
  for (const j of ["warrior", "mage", "archer"]) {
    const g = $("jp_" + j).getContext("2d");
    g.clearRect(0, 0, 72, 76);
    drawPix(g, j, 36, 74, 66, 0);
  }
}
drawJobPreviews();
$("btnContinue").addEventListener("click", () => begin(load()));
$("btnAgain").addEventListener("click", () => { // 다시: 직업부터 새로 고르기
  try { localStorage.removeItem("rpg_save"); } catch(e) {}
  $("victory").classList.add("hidden");
  started = false;
  $("btnContinue").classList.add("hidden");
  $("title").classList.remove("hidden");
  drawTitleScene();
});
const saved = load();
if (saved && !saved.clear) $("btnContinue").classList.remove("hidden");
drawTitleScene();

// ===== PWA 서비스 워커 등록 =====
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
